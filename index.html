{h2:"Speculative Decoding for Speed",body:`<p>A major speedup technique:</p><ul><li><strong>Draft model</strong> (small, fast) generates 5 tokens speculatively</li><li><strong>Main model</strong> (large, accurate) verifies all 5 tokens in one parallel pass</li><li>If all correct → accept all 5 tokens at once</li><li>If first 3 correct → accept 3, reject rest</li><li>Net result: 2–4× faster generation with same output quality</li></ul>`},
],quiz:[
{q:"A developer types `def calculate_` in Python. The inline completion must appear in under 200ms. Which model choice is appropriate?",opts:["GPT-4 Turbo (large, high quality, ~2s latency)","A 3–7B parameter code-specialized model (fast, good quality, ~100ms)","ChatGPT-4o mini (designed for chat, not inline completion)","No model — use regex pattern matching"],correct:1,exp:"Inline completions require sub-200ms latency to feel native. Large models (GPT-4 size) take 1–5s even with optimizations. A 3–7B parameter model fine-tuned on code (StarCoder, CodeLlama-7B) achieves ~100ms on modern GPU hardware — fast enough for real-time use."},
]}},
{id:45,title:"Lessons from System Failures",tag:"Case Studies",time:"20 min",content:{intro:"The best engineers learn from real failures. These outages teach lessons no textbook can: how cascading failures work, why monitoring must be independent, and why multi-region is non-negotiable.",sections:[
{h2:"Facebook 6-Hour Outage (October 4, 2021)",body:`<div class="code-block">What happened:
  Routine BGP (Border Gateway Protocol) configuration update
  accidentally removed all network routes to Facebook's data centers.
  
  Result: Facebook "disappeared" from the internet.
  
  Cascading failure:
    1. BGP routes removed → internet cannot reach Facebook
    2. Facebook's monitoring runs ON Facebook's infrastructure
    3. Monitoring goes down → engineers cannot diagnose remotely
    4. Facebook's internal DNS and auth also go down
    5. Engineers cannot remotely log into systems to fix them
    6. Physical access required → engineers must drive to data centers
  
  Duration: ~6 hours
  Impact:   WhatsApp, Instagram, Messenger all offline globally
  Cost:     ~$60M+ in lost ad revenue + brand damage</div>`,callout:{type:"warn",title:"Three Critical Lessons",body:"1) Never let a single config change affect 100% of infrastructure — use staged rollouts with automatic rollback. 2) Monitoring and incident tools must live on SEPARATE independent infrastructure. 3) Always maintain a physical out-of-band access path for emergencies (laptops that work without internal DNS)."}},
{h2:"AWS US-East-1 Outage (December 7, 2021)",body:`<p>AWS's largest region (Northern Virginia) suffered a major outage affecting Netflix, Disney+, Slack, DoorDash, and thousands of businesses.</p><p><strong>Root Cause:</strong> Automated network capacity expansion triggered a cascade of congestion in internal network routing.</p><div class="code-block">Cascade:
  1. Network scaling tool runs → triggers congestion
  2. Congestion → triggers more scaling
  3. Scaling → more congestion (positive feedback loop!)
  4. Dozens of AWS services degrade or fail
  5. AWS console itself becomes unusable
     → Engineers cannot manage other services</div>`,callout:{type:"warn",title:"Lesson: Multi-Region is Non-Negotiable",body:"Netflix runs in 3 AWS regions simultaneously. US-East-1 failing shifts traffic automatically to US-West-2 and EU-West-1. Users experienced slightly higher latency — zero downtime. Companies running in a single region had hours of total outage."}},
{h2:"Cascading Failure: The Most Dangerous Pattern",body:`<div class="code-block">How cascades start:
  Service A is slow → Service B (calls A) times out → B returns errors
  → Service C (calls B) gets errors → C's retry loop overwhelms B further
  → B is now 100% error → C fails → D fails → ...

Circuit Breaker Pattern:
  After N failures: "open" the circuit → stop calling the failing service
  → Return a default response or cached value
  → Re-try after 30 seconds to check if service recovered
  
  Prevents: retry storms, cascade amplification
  Enables: graceful degradation (partial functionality during outage)</div>`},
{h2:"Failure Prevention Principles",body:`<table class="comp-table"><thead><tr><th>Principle</th><th>Implementation</th></tr></thead><tbody><tr><td>Staged rollouts</td><td>Canary 1% → 10% → 50% → 100%, monitor at each step</td></tr><tr><td>Circuit breakers</td><td>Stop calling failing services to prevent cascade amplification</td></tr><tr><td>Independent monitoring</td><td>Monitoring infra separate from production infra</td></tr><tr><td>Chaos engineering</td><td>Netflix's Chaos Monkey randomly kills production servers to test resilience</td></tr><tr><td>Blameless postmortems</td><td>Analyze systemic causes, not individuals — publish findings</td></tr><tr><td>Multi-region</td><td>Active-active across 2+ regions for critical services</td></tr></tbody></table>`},
],quiz:[
{q:"During the Facebook outage, engineers could not remotely log into systems to fix them. Why?",opts:["Their passwords expired","Facebook's internal DNS and authentication systems ran on the same infrastructure that was down","The internet was down globally","A ransomware attack disabled access"],correct:1,exp:"Facebook's internal tooling (DNS, authentication, monitoring) all relied on the same network infrastructure that went down. When BGP routes were removed, ALL of Facebook's infrastructure became unreachable — including the tools engineers needed to fix the problem. This is why independent out-of-band infrastructure is critical."},
]}},
{id:46,title:"Concluding Remarks & Next Steps",tag:"Conclusion",time:"12 min",content:{intro:"Congratulations on completing this course. You now have the knowledge to design any large-scale system confidently. Here is how to turn this knowledge into interview success and real-world expertise.",sections:[
{h2:"What You Have Learned",body:`<table class="comp-table"><thead><tr><th>Topic Area</th><th>Key Skills</th></tr></thead><tbody><tr><td>Foundations</td><td>Abstractions, consistency models, CAP theorem, non-functional requirements, estimation</td></tr><tr><td>Building Blocks</td><td>DNS, Load Balancers, Databases, Caching, CDN, Queues, Blob Store, Rate Limiting</td></tr><tr><td>Advanced Components</td><td>Distributed search, logging, monitoring, task scheduling, sharded counters</td></tr><tr><td>Real Systems</td><td>YouTube, Uber, Twitter, WhatsApp, Google Maps, Instagram, TinyURL, Google Docs</td></tr><tr><td>AI Systems</td><td>ChatGPT architecture, RAG, feature stores, code assistants, LLM infrastructure</td></tr><tr><td>Reliability</td><td>Real-world failure case studies and prevention patterns</td></tr></tbody></table>`},
{h2:"Interview Preparation Checklist",body:`<ul><li>☐ Clarify functional and non-functional requirements before designing</li><li>☐ Estimate scale: RPS, storage, and bandwidth before choosing components</li><li>☐ Start with a simple design, then evolve it based on scale</li><li>☐ Justify every design decision with explicit trade-offs</li><li>☐ Discuss bottlenecks and how to address them</li><li>☐ Mention fault tolerance, monitoring, and failure scenarios</li><li>☐ Check in with the interviewer every 10 minutes</li><li>☐ Never code — draw boxes and arrows, explain verbally</li></ul>`},
{h2:"Your Learning Path Forward",body:`<p><strong>Build something real (best way to learn):</strong></p><ul><li>Build a URL shortener with Redis caching from scratch</li><li>Set up a Kafka producer-consumer pipeline</li><li>Deploy a service with blue-green deployment on AWS</li></ul><p><strong>Recommended reading:</strong></p><ul><li><strong>Designing Data-Intensive Applications</strong> by Martin Kleppmann — the definitive book on distributed systems</li><li><strong>System Design Interview</strong> by Alex Xu — interview-focused, highly practical</li><li><strong>The Google SRE Book</strong> — free online, real-world reliability engineering</li></ul><p><strong>Engineering blogs to follow:</strong></p><ul><li>Netflix Tech Blog, Uber Engineering, Airbnb Engineering, Meta Engineering</li><li>High Scalability (highscalability.com) — how real systems are built</li></ul>`,callout:{type:"success",title:"The Secret to Mastery",body:"There is no single right answer in system design. What matters: can you identify requirements, make reasonable trade-offs, and communicate your thinking clearly? These three skills separate good engineers from great ones. Practice them in every conversation, code review, and design discussion."}},
],quiz:[
{q:"After completing this course, what is the MOST effective next step to prepare for system design interviews?",opts:["Read 5 more system design books","Do mock interviews weekly and explain your designs out loud","Memorize all the building blocks","Watch more video lectures"],correct:1,exp:"Knowledge without practice does not translate to interview performance. System design is a communication skill — you must practice explaining your reasoning under time pressure. Mock interviews (recorded and reviewed) are the single highest-impact activity for interview readiness."},
]}},
{id:47,title:"System Design Case Studies",tag:"Case Studies",time:"18 min",content:{intro:"Real companies solving real problems at real scale. These case studies reveal the gap between textbook theory and production reality.",sections:[
{h2:"How Spotify Wrapped Scales for 400M Users",body:`<div class="code-block">Challenge:
  On launch day, 400M+ users simultaneously open the app
  expecting instant personalized yearly statistics.
  This is an impossible traffic spike if computed on-demand.

Solution: Pre-compute everything weeks before launch

Weeks before launch day:
  1. MapReduce job processes ALL users' listening history
     → For each user: top songs, artists, minutes, genres
  2. Results stored in key-value store:
     SET wrapped:{userId} → { topSong: "...", totalMinutes: 12453, ... }
  3. Results pre-cached in Redis globally

On launch day:
  User opens app → GET wrapped:{userId} from Redis → instant!
  Zero computation. Pure cache reads. Handles 400M users.</div>`,callout:{type:"success",title:"Key Lesson",body:"For predictable, scheduled traffic spikes, pre-compute all results in advance. Do not compute on-demand when millions hit you simultaneously. Move computation to off-peak hours using batch jobs."}},
{h2:"How Amazon Scales for Prime Day",body:`<p>Prime Day generates more traffic than Black Friday + Cyber Monday combined. Amazon's strategies:</p><ul><li><strong>Capacity planning</strong> — Model expected traffic 3 months ahead, provision extra</li><li><strong>Cell-based architecture</strong> — Users assigned to isolated 'cells'; one cell's problems cannot cascade to others</li><li><strong>Load shedding</strong> — Gracefully reject low-priority requests (analytics) when system is near capacity rather than crashing</li><li><strong>Chaos testing</strong> — Simulate Prime Day traffic in staging weeks in advance</li></ul>`},
{h2:"Dropbox: Deduplication at Scale",body:`<div class="code-block">Challenge: 700M users storing files → enormous storage costs

Content-Addressable Deduplication:
  1. Every file is split into 4 MB chunks
  2. Each chunk is SHA-256 hashed
  3. Hash is the storage key
  4. Before storing: check if hash exists already
  5. If yes: just store a reference, no new data!

Result:
  Two users upload identical file (e.g., popular software installer)
  → Only ONE copy stored in blob storage
  → Both users' metadata points to same chunks
  → Saves Dropbox petabytes of storage

Sync efficiency:
  File changes 1% → only 1% of chunks need syncing
  Edit one word in a 100MB document → sync only 4MB chunk</div>`},
{h2:"Ticketmaster: Handling Taylor Swift Ticket Sales",body:`<div class="code-block">Challenge:
  Taylor Swift tickets go on sale → millions of fans simultaneously
  → 100,000 concurrent buyers competing for 50,000 seats
  → Traditional queue would let fastest connection win (unfair)
  → System would likely crash under load

Solution: Virtual Waiting Room

1. Pre-registration period:
   Fans register in advance → randomly assigned a queue position
   (Lottery — not fastest internet wins)

2. Sale day:
   Fans enter virtual waiting room with their queue position
   Groups of ~1000 let in every few minutes
   (Converts spike into controlled flow)

3. Seat reservation:
   Seat locked for 10 minutes while user checks out
   → Pessimistic locking with Redis (SETNX seat:{seatId} userId)
   → Expires after 10 min if not purchased

4. Payment:
   Idempotency key prevents double-charging
   Seat released if payment fails or times out</div>`},
],quiz:[
{q:"Spotify Wrapped is released on December 1 every year. On December 1, 400M users open the app simultaneously. What is Spotify's key insight to handle this?",opts:["Auto-scale servers to 400M capacity on December 1","Pre-compute all wrapped statistics weeks before, cache in Redis — launch day is just cache reads","Use 400M database shards","Compute each user's statistics as they open the app in parallel"],correct:1,exp:"Pre-computation is the key insight. Spotify processes all listening history weeks before launch, stores results per user in Redis. On launch day, 400M users get instant responses — pure cache reads, no computation. This transforms an impossible real-time compute problem into a trivial cache lookup problem."},
]}}

// ── STATE ─────────────────────────────────────────────────────────────────
const done = new Set(JSON.parse(localStorage.getItem('sd_done')||'[]'));
let curId = null;
let streak = parseInt(localStorage.getItem('sd_streak')||'1');

// ── NAV ───────────────────────────────────────────────────────────────────
function renderNav(filter=''){
  const nav = document.getElementById('sb-nav');
  const tags = [...new Set(MODULES.map(m=>m.tag))];
  nav.innerHTML = '';
  tags.forEach(tag=>{
    const items = MODULES.filter(m=>m.tag===tag && (!filter||m.title.toLowerCase().includes(filter.toLowerCase())||m.tag.toLowerCase().includes(filter.toLowerCase())));
    if(!items.length) return;
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="nav-sec-hdr">${tag}</div>`;
    items.forEach(m=>{
      const isDone = done.has(m.id);
      const isActive = curId===m.id;
      const btn = document.createElement('button');
      btn.className = `nav-item${isDone?' done':''}${isActive?' active':''}`;
      btn.innerHTML = `<span class="ni-num">${isDone?'✓':isActive?'▶':m.id}</span><span class="ni-label">${m.title}</span><span class="ni-check">${isDone&&!isActive?'✓':isActive?'▶':''}</span><span class="ni-dur">${m.time}</span>`;
      btn.onclick = ()=>{loadModule(m.id); if(window.innerWidth<=900) toggleSidebar(false);};
      sec.appendChild(btn);
    });
    nav.appendChild(sec);
  });
}

function filterNav(v){ renderNav(v); }

function updateProgress(){
  const pct = Math.round(done.size/MODULES.length*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
}

// ── LESSON ────────────────────────────────────────────────────────────────
function loadModule(id){
  curId = id;
  const m = MODULES.find(x=>x.id===id);
  if(!m) return;
  renderNav();
  updateProgress();
  document.getElementById('tn-title').textContent = m.title;
  const isDone = done.has(id);
  const btn = document.getElementById('tn-complete');
  btn.style.display = '';
  btn.textContent = isDone ? '✓ Completed' : '✓ Mark Complete';
  btn.style.background = isDone ? '#16a34a' : '';
  document.getElementById('content').innerHTML = buildLesson(m);
  window.scrollTo(0,0);
}

function buildLesson(m){
  const idx = MODULES.findIndex(x=>x.id===m.id);
  const prev = MODULES[idx-1];
  const next = MODULES[idx+1];
  const isDone = done.has(m.id);
  const icons = {info:'💡',warn:'⚠️',success:'✅',tip:'💎'};

  let body = `<div class="lesson-hero">
    <div class="lesson-meta">
      <span class="badge badge-mod">Module ${m.id}</span>
      <span class="badge badge-time">⏱ ${m.time}</span>
      <span class="badge badge-tag">${m.tag}</span>
      ${isDone?'<span class="badge badge-done">✓ Completed</span>':''}
    </div>
    <h1 class="lesson-title">${m.title}</h1>
    <p class="lesson-sub">${m.content.intro}</p>
    <div class="lesson-acts">
      <button class="btn-done${isDone?' completed':''}" onclick="markDone()">
        ${isDone?'✓ Completed — Review Anytime':'Mark as Complete'}
      </button>
      ${next?`<button class="btn btn-ghost" onclick="loadModule(${next.id})">Next: ${next.title} →</button>`:''}
    </div>
  </div>
  <div class="lesson-body">`;

  m.content.sections.forEach(sec=>{
    body += `<h2>${sec.h2}</h2>${sec.body||''}`;
    if(sec.callout){
      const t = sec.callout.type||'info';
      body += `<div class="callout callout-${t}"><div class="callout-title">${icons[t]||'💡'} ${sec.callout.title}</div><div>${sec.callout.body}</div></div>`;
    }
  });

  if(m.content.quiz&&m.content.quiz.length){
    body += `<div class="quiz-section"><div class="quiz-hdr">🧠 Knowledge Check</div>`;
    m.content.quiz.forEach((q,qi)=>{
      body += `<div class="quiz-q" data-qi="${qi}"><p class="q-text">${qi+1}. ${q.q}</p><div class="quiz-opts">`;
      q.opts.forEach((opt,oi)=>{
        body += `<button class="quiz-opt" onclick="answerQ(${m.id},${qi},${oi})">${opt}</button>`;
      });
      body += `</div><div class="quiz-fb" id="qfb-${m.id}-${qi}"></div></div>`;
    });
    body += `</div>`;
  }

  body += `</div>
  <div class="lesson-nav-bot">
    <button class="nav-arr" onclick="loadModule(${prev?prev.id:m.id})" ${!prev?'disabled':''}>← ${prev?prev.title.substring(0,30)+(prev.title.length>30?'…':''):'Start'}</button>
    <span style="font-size:11px;color:var(--text2)">${idx+1} / ${MODULES.length}</span>
    <button class="nav-arr next" onclick="${next?`loadModule(${next.id})`:`showOverview()`}">${next?(next.title.substring(0,28)+(next.title.length>28?'…':''))+' →':'↩ Overview'}</button>
  </div>`;

  return body;
}

function answerQ(mid, qi, oi){
  const m = MODULES.find(x=>x.id===mid);
  const q = m.content.quiz[qi];
  const qEl = document.querySelector(`[data-qi="${qi}"]`);
  if(!qEl) return;
  const opts = qEl.querySelectorAll('.quiz-opt');
  opts.forEach((o,i)=>{
    o.disabled = true;
    if(i===q.correct) o.classList.add(oi===q.correct?'correct':'reveal');
    if(i===oi&&oi!==q.correct) o.classList.add('wrong');
  });
  const fb = document.getElementById(`qfb-${mid}-${qi}`);
  if(fb){ fb.className=`quiz-fb show ${oi===q.correct?'correct':'wrong'}`; fb.textContent=(oi===q.correct?'✓ Correct! ':'✗ Not quite. ')+q.exp; }
}

function markDone(){
  if(!curId) return;
  if(!done.has(curId)){
    done.add(curId);
    localStorage.setItem('sd_done', JSON.stringify([...done]));
    streak++; localStorage.setItem('sd_streak', streak);
    document.getElementById('streak-val').textContent = streak+' day'+(streak===1?'':'s');
    showXP(curId);
  }
  loadModule(curId);
}

function showXP(id){
  const m = MODULES.find(x=>x.id===id);
  const t = document.getElementById('xp-toast');
  document.getElementById('xp-msg').textContent = `+50 XP — "${m.title}" Complete!`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3200);
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────
function showOverview(){
  curId = null;
  document.getElementById('tn-complete').style.display = 'none';
  document.getElementById('tn-title').textContent = 'Modern System Design';
  renderNav();
  const totalMin = MODULES.reduce((s,m)=>s+parseInt(m.time),0);
  const tags = [...new Set(MODULES.map(m=>m.tag))];

  let html = `<div class="overview">
    <div class="ov-hero">
      <h1>Modern System Design</h1>
      <p>${MODULES.length} modules · ${Math.round(totalMin/60)} hours of content · From zero to designing YouTube, Uber, Twitter, WhatsApp, and more.</p>
      <div class="stats-grid">
        <div class="stat-card"><div class="val">${MODULES.length}</div><div class="lbl">Modules</div></div>
        <div class="stat-card"><div class="val">${Math.round(totalMin/60)}h</div><div class="lbl">Total Time</div></div>
        <div class="stat-card"><div class="val">${done.size}</div><div class="lbl">Completed</div></div>
        <div class="stat-card"><div class="val">${Math.round(done.size/MODULES.length*100)}%</div><div class="lbl">Progress</div></div>
      </div>
    </div>`;

  tags.forEach(tag=>{
    const items = MODULES.filter(m=>m.tag===tag);
    const tagDone = items.filter(m=>done.has(m.id)).length;
    html += `<div class="sec-hdr"><h2>${tag}</h2><span style="font-size:11.5px;color:var(--text2)">${tagDone}/${items.length} completed</span></div><div class="modules-grid">`;
    items.forEach((m,i)=>{
      const isDone = done.has(m.id);
      html += `<div class="mod-card${isDone?' completed':''}" onclick="loadModule(${m.id})" style="animation-delay:${i*0.035}s">
        <div class="mc-top"><div class="mc-num">${m.id}</div><span style="font-size:16px">${isDone?'✅':'⭕'}</span></div>
        <div class="mc-title">${m.title}</div>
        <div class="mc-meta"><span>⏱ ${m.time}</span><span class="mc-tag">${m.tag}</span></div>
      </div>`;
    });
    html += `</div>`;
  });

  const next = MODULES.find(m=>!done.has(m.id));
  if(next){
    html += `<div style="text-align:center;padding:20px 0 40px"><button class="cont-btn" onclick="loadModule(${next.id})">Continue: ${next.title} →</button></div>`;
  } else {
    html += `<div style="text-align:center;padding:30px 0 50px"><div style="font-size:40px;margin-bottom:12px">🎓</div><p style="font-family:var(--font-head);font-size:22px;font-weight:800;margin-bottom:8px">Course Complete!</p><p style="color:var(--text2)">You have mastered Modern System Design. Go build something great.</p></div>`;
  }

  html += `</div>`;
  document.getElementById('content').innerHTML = html;
}

// ── SIDEBAR ───────────────────────────────────────────────────────────────
function toggleSidebar(force){
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const open = force !== undefined ? force : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  ov.classList.toggle('show', open);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('streak-val').textContent = streak + ' day' + (streak===1?'':'s');
renderNav();
updateProgress();
showOverview();
</script>
</body>
</html>
