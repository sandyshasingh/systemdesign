<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SystemDesign.dev — Master System Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0f13;--bg2:#16161e;--bg3:#1e1e2a;--bg4:#252535;
  --surface:#1a1a26;--surface2:#22223a;
  --border:#2a2a3d;--border2:#363650;
  --accent:#7c6af7;--accent2:#9d8fff;--accent-glow:rgba(124,106,247,0.15);
  --gold:#f5c518;--text:#e8e8f0;--text2:#9090b0;
  --green:#22c55e;--red:#ef4444;--orange:#f97316;--cyan:#06b6d4;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
  --r:12px;--r2:8px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* SIDEBAR */
#sidebar{position:fixed;top:0;left:0;width:300px;height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-header{padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:var(--font-head);font-size:19px;font-weight:800;background:linear-gradient(135deg,var(--accent2),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.logo span{-webkit-text-fill-color:var(--gold)}
.prog-wrap{margin-top:12px}
.prog-label{font-size:11px;color:var(--text2);margin-bottom:5px;display:flex;justify-content:space-between}
.prog-bar{height:4px;background:var(--bg4);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#c084fc);border-radius:99px;transition:width .5s ease;width:0%}
.sb-search{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:7px 11px}
.search-box input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font-body);font-size:13px;width:100%}
.search-box input::placeholder{color:var(--text2)}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0 16px}
.nav-sec-hdr{padding:10px 18px 5px;font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--text2);font-weight:600;font-family:var(--font-head)}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;transition:background .12s,color .12s;position:relative;border:none;background:none;width:100%;text-align:left;color:var(--text2);font-family:var(--font-body);font-size:13px;line-height:1.4}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--accent-glow);color:var(--accent2)}
.nav-item.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item .ni-num{width:21px;height:21px;border-radius:50%;background:var(--bg4);color:var(--text2);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font-head)}
.nav-item.done .ni-num{background:rgba(34,197,94,.15);color:var(--green)}
.nav-item.active .ni-num{background:var(--accent-glow);color:var(--accent2)}
.nav-item .ni-label{flex:1;min-width:0}
.nav-item .ni-dur{font-size:10.5px;color:var(--text2);flex-shrink:0}
.nav-item.active .ni-dur{color:var(--accent)}
.nav-item .ni-check{font-size:12px;flex-shrink:0;width:14px;text-align:center}
.nav-item.done .ni-check{color:var(--green)}
.nav-item.active .ni-check{color:var(--accent2)}
.sb-footer{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0}
.streak{display:flex;align-items:center;gap:10px;background:rgba(245,197,24,.06);border:1px solid rgba(245,197,24,.18);border-radius:var(--r2);padding:9px 13px}
.streak .s1{font-size:11px;color:var(--text2)}
.streak .s2{font-size:14px;font-weight:700;color:var(--gold);font-family:var(--font-head)}

/* MAIN */
#main{margin-left:300px;min-height:100vh;display:flex;flex-direction:column}
#topnav{position:sticky;top:0;z-index:50;background:rgba(15,15,19,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;gap:14px}
.tn-title{font-family:var(--font-head);font-size:13px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text2)}
.tn-actions{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:var(--r2);font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer;transition:all .14s;border:none}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2);transform:translateY(-1px)}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;font-size:20px;padding:4px;flex-shrink:0}

/* LESSON */
.lesson-hero{background:var(--bg2);border-bottom:1px solid var(--border);padding:28px 36px;background-image:radial-gradient(ellipse 80% 50% at 75% 40%,rgba(124,106,247,.09),transparent)}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.badge-mod{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(124,106,247,.22)}
.badge-time{background:rgba(6,182,212,.1);color:var(--cyan);border:1px solid rgba(6,182,212,.18)}
.badge-tag{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.18)}
.badge-done{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.22)}
.lesson-title{font-family:var(--font-head);font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2}
.lesson-sub{color:var(--text2);font-size:14.5px;max-width:680px;line-height:1.65}
.lesson-acts{display:flex;align-items:center;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn-done{background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff;padding:9px 20px;border-radius:var(--r2);border:none;font-family:var(--font-head);font-size:13.5px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.btn-done:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(124,106,247,.28)}
.btn-done.completed{background:linear-gradient(135deg,#16a34a,#15803d)}

/* LESSON BODY */
.lesson-body{padding:36px;max-width:860px}
.lesson-body h2{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--text);margin:32px 0 12px;letter-spacing:-.3px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.lesson-body h2:first-child{margin-top:0}
.lesson-body h3{font-family:var(--font-head);font-size:15px;font-weight:600;color:var(--accent2);margin:22px 0 9px}
.lesson-body p{color:var(--text2);margin-bottom:13px;line-height:1.75}
.lesson-body p strong{color:var(--text);font-weight:600}
.lesson-body ul,.lesson-body ol{padding-left:20px;margin-bottom:13px}
.lesson-body li{color:var(--text2);margin-bottom:5px;line-height:1.65}
.lesson-body li strong{color:var(--text)}

.callout{border-radius:var(--r);padding:14px 16px;margin:18px 0;border-left:3px solid}
.callout-info{background:rgba(124,106,247,.07);border-color:var(--accent)}
.callout-warn{background:rgba(245,197,24,.07);border-color:var(--gold)}
.callout-success{background:rgba(34,197,94,.07);border-color:var(--green)}
.callout-tip{background:rgba(6,182,212,.07);border-color:var(--cyan)}
.callout-title{font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:5px;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.callout-info .callout-title{color:var(--accent2)}
.callout-warn .callout-title{color:var(--gold)}
.callout-success .callout-title{color:var(--green)}
.callout-tip .callout-title{color:var(--cyan)}
.callout p,.callout div{color:var(--text2);font-size:13.5px;line-height:1.65}

.code-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin:14px 0;overflow-x:auto;font-family:'Courier New',monospace;font-size:12.5px;line-height:1.75;color:#c9d1d9;position:relative;white-space:pre}
.code-block .code-lbl{position:absolute;top:8px;right:10px;font-size:9.5px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-family:var(--font-body);white-space:normal}

.comp-table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.comp-table th{background:var(--bg3);color:var(--accent2);font-family:var(--font-head);font-weight:600;font-size:11px;letter-spacing:.4px;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--border)}
.comp-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top}
.comp-table tr:hover td{background:var(--bg3);color:var(--text)}
.comp-table tr:last-child td{border-bottom:none}

.quiz-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin:28px 0 0}
.quiz-hdr{font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.quiz-q{margin-bottom:18px}
.q-text{color:var(--text);font-weight:500;margin-bottom:9px;font-size:14px}
.quiz-opts{display:grid;gap:7px}
.quiz-opt{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 13px;cursor:pointer;transition:all .13s;color:var(--text2);font-size:13px;text-align:left;font-family:var(--font-body);width:100%}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);color:var(--text);background:var(--accent-glow)}
.quiz-opt.correct{background:rgba(34,197,94,.1);border-color:var(--green);color:var(--green)}
.quiz-opt.wrong{background:rgba(239,68,68,.1);border-color:var(--red);color:var(--red)}
.quiz-opt.reveal{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.05)}
.quiz-fb{margin-top:7px;padding:7px 11px;border-radius:var(--r2);font-size:12.5px;display:none;line-height:1.55}
.quiz-fb.show{display:block}
.quiz-fb.correct{background:rgba(34,197,94,.1);color:#4ade80}
.quiz-fb.wrong{background:rgba(239,68,68,.1);color:#f87171}

.lesson-nav-bot{display:flex;align-items:center;justify-content:space-between;padding:20px 36px;border-top:1px solid var(--border);background:var(--bg2);gap:10px;flex-wrap:wrap}
.nav-arr{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--r2);background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:all .13s;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-arr:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.nav-arr.next{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-arr.next:hover{background:var(--accent2)}
.nav-arr:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

/* OVERVIEW */
.overview{padding:36px}
.ov-hero{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px;margin-bottom:28px;position:relative;overflow:hidden;background-image:radial-gradient(ellipse 55% 80% at 88% 50%,rgba(124,106,247,.11),transparent)}
.ov-hero h1{font-family:var(--font-head);font-size:30px;font-weight:800;letter-spacing:-.8px;margin-bottom:8px}
.ov-hero p{color:var(--text2);max-width:550px;font-size:14.5px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:22px}
.stat-card{background:var(--bg3);border-radius:var(--r);padding:14px;text-align:center}
.stat-card .val{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--accent2)}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-hdr h2{font-family:var(--font-head);font-size:17px;font-weight:700}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:32px}
.mod-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .18s;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.mod-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent-glow),transparent);opacity:0;transition:opacity .18s}
.mod-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.mod-card:hover::before{opacity:1}
.mod-card.completed{border-color:rgba(34,197,94,.28)}
.mod-card.completed::before{background:linear-gradient(135deg,rgba(34,197,94,.06),transparent);opacity:1}
.mc-top{display:flex;align-items:center;justify-content:space-between}
.mc-num{width:30px;height:30px;border-radius:var(--r2);background:var(--accent-glow);color:var(--accent2);font-family:var(--font-head);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.mod-card.completed .mc-num{background:rgba(34,197,94,.12);color:var(--green)}
.mc-title{font-family:var(--font-head);font-size:13.5px;font-weight:600;line-height:1.3}
.mc-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.mc-tag{display:inline-block;padding:2px 7px;border-radius:99px;background:var(--bg4);font-size:10px;color:var(--text2)}
.cont-btn{background:linear-gradient(135deg,var(--accent),#9333ea);color:#fff;padding:12px 26px;border-radius:var(--r2);border:none;font-family:var(--font-head);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
.cont-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(124,106,247,.3)}

/* MOBILE */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:99;backdrop-filter:blur(2px)}
#overlay.show{display:block}
@media(max-width:900px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .hamburger{display:block}
  .lesson-body,.overview{padding:20px}
  .lesson-hero{padding:20px}
  .lesson-nav-bot{padding:14px 20px}
  .lesson-title{font-size:21px}
  .ov-hero{padding:22px}
  .ov-hero h1{font-size:23px}
}
@media(max-width:560px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .modules-grid{grid-template-columns:1fr}
  .lesson-acts{flex-direction:column;align-items:flex-start}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.lesson-hero,.lesson-body,.ov-hero{animation:fadeUp .28s ease both}
.mod-card{animation:fadeUp .28s ease both}

#xp-toast{position:fixed;bottom:26px;right:26px;z-index:999;background:var(--bg2);border:1px solid var(--green);border-radius:var(--r);padding:12px 18px;display:flex;align-items:center;gap:9px;font-family:var(--font-head);font-size:13.5px;color:var(--green);transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.4,0,.2,1);pointer-events:none}
#xp-toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>
<aside id="sidebar">
  <div class="sb-header">
    <div class="logo">System<span>.</span>Design</div>
    <div class="prog-wrap">
      <div class="prog-label"><span>Your Progress</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </div>
  <div class="sb-search">
    <div class="search-box">
      <span style="color:var(--text2);font-size:14px">⌕</span>
      <input type="text" placeholder="Search modules..." id="search-input" oninput="filterNav(this.value)">
    </div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-footer">
    <div class="streak">
      <span style="font-size:20px">🔥</span>
      <div><div class="s1">Learning streak</div><div class="s2" id="streak-val">1 day</div></div>
    </div>
  </div>
</aside>
<div id="overlay" onclick="toggleSidebar()"></div>
<main id="main">
  <header id="topnav">
    <button class="hamburger" onclick="toggleSidebar()">☰</button>
    <div class="tn-title" id="tn-title">Modern System Design</div>
    <div class="tn-actions">
      <button class="btn btn-ghost" onclick="showOverview()">⊞ Overview</button>
      <button class="btn btn-accent" id="tn-complete" onclick="markDone()" style="display:none">✓ Mark Complete</button>
    </div>
  </header>
  <div id="content"></div>
</main>
<div id="xp-toast"><span style="font-size:18px">⭐</span><span id="xp-msg">+50 XP — Module Complete!</span></div>
<script>
const MODULES=[
{id:1,title:"Introduction to System Design",tag:"Foundations",time:"12 min",content:{intro:"Welcome to the most important skill in senior software engineering. System Design separates engineers who write code from engineers who build products used by millions.",sections:[
{h2:"What Is System Design?",body:`<p>Imagine building a social media app like Instagram. You'd need to plan:</p><ul><li>Where do you store millions of photos?</li><li>How do you show a friend's post in seconds from another country?</li><li>What happens when 10 million people open the app simultaneously?</li></ul><p><strong>System Design</strong> is the process of planning how all these pieces fit together. It's like being an architect — before building a skyscraper, you draw blueprints. Before building software used by millions, you design the system.</p>`,callout:{type:"info",title:"🏠 Real-Life Analogy",body:"Think of building a city. You need roads (networks), buildings (servers), water supply (databases), emergency services (fault tolerance), and a city plan (architecture). System Design is creating that city plan for software."}},
{h2:"Why Every Developer Should Learn This",body:`<table class="comp-table"><thead><tr><th>Reason</th><th>What It Means for You</th></tr></thead><tbody><tr><td>Better Code</td><td>You think about scalability before coding, not after bugs hit production</td></tr><tr><td>Higher Compensation</td><td>Senior + Staff engineer roles require system design fluency</td></tr><tr><td>Interview Success</td><td>FAANG companies always ask system design at senior level</td></tr><tr><td>Career Growth</td><td>Architects and tech leads design systems every day</td></tr><tr><td>Real Problem Solving</td><td>You'll handle outages, slow systems, and scaling challenges</td></tr></tbody></table>`,callout:{type:"success",title:"✅ Key Takeaway",body:"System Design = planning how software components connect, scale, and survive failures. It's the skill that separates junior developers from senior engineers."}},
{h2:"What This Course Covers",body:`<p>47 modules covering every aspect of modern distributed systems:</p><ul><li><strong>Foundations</strong> — Abstractions, consistency models, non-functional requirements</li><li><strong>Core Building Blocks</strong> — DNS, Load Balancers, Databases, Caches, CDNs, Queues</li><li><strong>Real System Designs</strong> — YouTube, Uber, Twitter, WhatsApp, Google Maps, Instagram</li><li><strong>AI Systems</strong> — ChatGPT, LLM bots, AI code assistants, ML data infrastructure</li><li><strong>Failure Case Studies</strong> — Real outages and what they teach us</li></ul>`},
],quiz:[
{q:"What is the primary goal of System Design?",opts:["Writing faster code","Planning how components connect, scale, and survive failures","Choosing a programming language","Fixing bugs"],correct:1,exp:"System Design is about planning architecture — not code. It ensures a system can scale, remain available, and handle failures gracefully."},
{q:"When should you think about System Design?",opts:["Only after the app breaks","After all features are built","Before and throughout development","Only for apps with 1M+ users"],correct:2,exp:"Great engineers think about system design from day one. Retrofitting scalability is far harder than designing for it upfront."},
]}},
{id:2,title:"System Design Interviews",tag:"Interview Prep",time:"18 min",content:{intro:"System Design Interviews are open-ended conversations where you design a large-scale system in 45–60 minutes. Unlike coding interviews, there is no single correct answer — the interviewer evaluates HOW you think.",sections:[
{h2:"The RESHADED Framework",body:`<p>RESHADED gives you a repeatable structure for any system design problem:</p><table class="comp-table"><thead><tr><th>Letter</th><th>Phase</th><th>Time</th></tr></thead><tbody><tr><td><strong>R</strong></td><td>Requirements Clarification</td><td>5 min</td></tr><tr><td><strong>E</strong></td><td>Estimation (back-of-envelope)</td><td>5 min</td></tr><tr><td><strong>S</strong></td><td>Storage Schema Design</td><td>5 min</td></tr><tr><td><strong>H</strong></td><td>High-Level Design</td><td>10 min</td></tr><tr><td><strong>A</strong></td><td>API Design</td><td>5 min</td></tr><tr><td><strong>D</strong></td><td>Detailed Component Design</td><td>10 min</td></tr><tr><td><strong>E</strong></td><td>Evaluation of trade-offs</td><td>5 min</td></tr><tr><td><strong>D</strong></td><td>Distinctive Features / Edge Cases</td><td>5 min</td></tr></tbody></table>`,callout:{type:"info",title:"💡 Pro Tip",body:"RESHADED is a guide, not a rigid script. Check in with the interviewer every 10 minutes: 'Should I dive deeper into the database layer or move on to caching?' This shows collaborative thinking."}},
{h2:"Do's and Don'ts",body:`<table class="comp-table"><thead><tr><th>✓ DO</th><th>✗ DON'T</th></tr></thead><tbody><tr><td>Ask clarifying questions first</td><td>Jump into design without clarifying</td></tr><tr><td>State your assumptions out loud</td><td>Stay silent for more than 2 minutes</td></tr><tr><td>Start simple, then add complexity</td><td>Over-engineer the first design</td></tr><tr><td>Discuss trade-offs for every choice</td><td>Present choices without justification</td></tr><tr><td>Draw diagrams as you explain</td><td>Ignore non-functional requirements</td></tr><tr><td>Estimate scale before choosing tech</td><td>Choose databases before knowing the load</td></tr></tbody></table>`},
{h2:"Why Engineers Fail",body:`<ul><li><strong>No structure</strong> — jumping randomly between topics</li><li><strong>Too much detail too early</strong> — spending 30 minutes on one component</li><li><strong>No trade-off discussion</strong> — designing without justifying choices</li><li><strong>Passive</strong> — waiting for hints instead of driving the conversation</li><li><strong>Ignoring failure scenarios</strong> — not discussing what happens when things break</li></ul>`,callout:{type:"warn",title:"⚠️ Common Mistake",body:"Many candidates start coding immediately. Never write code in a system design interview. Draw boxes, arrows, and talk through the architecture at a high level first."}},
{h2:"Preparation Strategy",body:`<p>How long to prepare depends on your current level:</p><table class="comp-table"><thead><tr><th>Experience</th><th>Preparation Time</th></tr></thead><tbody><tr><td>Junior (0–2 years)</td><td>3–4 months, daily 1-hour sessions</td></tr><tr><td>Mid-level (2–5 years)</td><td>6–8 weeks focused practice</td></tr><tr><td>Senior (5+ years)</td><td>3–4 weeks to structure existing knowledge</td></tr></tbody></table>`,callout:{type:"success",title:"Best Practice",body:"Do at least 2 mock interviews per week. Recording yourself and reviewing the replay is one of the fastest ways to spot weaknesses in your communication style."}},
],quiz:[
{q:"What does the 'R' in RESHADED stand for?",opts:["Response Design","Requirements Clarification","Reliability Testing","Resource Allocation"],correct:1,exp:"Requirements Clarification is always first — you must understand what you're building before you can design it."},
{q:"You're asked to 'Design Twitter'. What's your FIRST move?",opts:["Draw a database schema","Pick a programming language","Ask clarifying questions about scale and features","Start explaining microservices"],correct:2,exp:"Always clarify before designing! Ask: how many users? Read-heavy or write-heavy? Which features matter most? This shapes every decision."},
]}},
{id:3,title:"Preliminary Concepts",tag:"Foundations",time:"15 min",content:{intro:"Before designing systems, you must understand the fundamental abstractions: how services communicate, what consistency means, and how failures occur in distributed environments.",sections:[
{h2:"Abstractions in System Design",body:`<p>An <strong>abstraction</strong> hides complexity. When you drive a car, you do not need to understand the engine — you just use the steering wheel. In system design, abstractions let engineers build on complex systems without worrying about inner details.</p><table class="comp-table"><thead><tr><th>Abstraction</th><th>Real-Life Equivalent</th></tr></thead><tbody><tr><td>API</td><td>A restaurant menu — you order without knowing how the kitchen works</td></tr><tr><td>Database</td><td>A filing cabinet — you store and retrieve without knowing disk mechanics</td></tr><tr><td>Cache</td><td>Your desk — quick access to things you use often</td></tr><tr><td>Load Balancer</td><td>A traffic officer — directs cars to open lanes</td></tr><tr><td>Message Queue</td><td>A post office — messages delivered asynchronously, no waiting required</td></tr></tbody></table>`},
{h2:"Remote Procedure Calls (RPC)",body:`<p>RPC lets one computer call a function on another computer as if it were local. It abstracts away all the network complexity.</p><div class="code-block">Client Machine                    Server Machine
    |                                     |
    |-- getUser(userId=5) ----------->    |
    |                                     |  (runs the function)
    |<-- returns { name:"Alice" } --------|
    |                                     |
Modern implementations: gRPC (Google), REST, GraphQL
Each solves the same core problem: clean service-to-service communication.</div>`},
{h2:"Spectrum of Consistency Models",body:`<p>Consistency means: when you read data, do you get the most up-to-date version?</p><table class="comp-table"><thead><tr><th>Model</th><th>What It Means</th><th>Example</th></tr></thead><tbody><tr><td><strong>Strong Consistency</strong></td><td>Every read gets the latest write. Slowest.</td><td>Bank balance — must be exact</td></tr><tr><td><strong>Eventual Consistency</strong></td><td>Reads might be stale, but will sync later. Fastest.</td><td>Facebook like count</td></tr><tr><td><strong>Causal Consistency</strong></td><td>Causally related events appear in the correct order.</td><td>Replies appear after their parent post</td></tr><tr><td><strong>Read-your-writes</strong></td><td>You always see your own writes immediately.</td><td>Your own profile updates</td></tr></tbody></table>`,callout:{type:"warn",title:"💡 Trade-off",body:"Strong consistency = slower but accurate. Eventual consistency = faster but may show stale data. Choose based on use case. Banks need strong. Social feeds can use eventual."}},
{h2:"The Spectrum of Failure Models",body:`<table class="comp-table"><thead><tr><th>Failure Type</th><th>What Happens</th><th>Defense</th></tr></thead><tbody><tr><td>Fail-Stop</td><td>Component stops and notifies others</td><td>Health checks + auto-restart</td></tr><tr><td>Crash Failure</td><td>Component stops without warning</td><td>Timeouts + circuit breakers</td></tr><tr><td>Omission Failure</td><td>Some messages dropped silently</td><td>Acknowledgments + retries</td></tr><tr><td>Byzantine Failure</td><td>Component behaves unpredictably or maliciously</td><td>Consensus algorithms (Raft, PBFT)</td></tr></tbody></table>`},
],quiz:[
{q:"An e-commerce site shows '3 items left in stock' but the real count is 2. Which consistency model allows this?",opts:["Strong Consistency","Causal Consistency","Eventual Consistency","Linearizability"],correct:2,exp:"Eventual consistency allows temporary stale reads. The inventory will eventually sync. This is acceptable for stock counts — just add oversell protection downstream."},
{q:"A bank must ensure that when money is debited from Account A, it is always credited to Account B — even if a server crashes mid-transfer. Which failure model concerns you most?",opts:["Fail-Stop","Omission Failure","Crash Failure","Byzantine Failure"],correct:2,exp:"A crash failure mid-transaction is the primary concern. The solution is ACID database transactions — if the server crashes, the transaction rolls back atomically, preventing partial updates."},
]}},
{id:4,title:"Non-Functional Requirements",tag:"Foundations",time:"14 min",content:{intro:"Functional requirements describe WHAT a system does. Non-functional requirements describe HOW WELL it does it — and they often determine your entire architecture.",sections:[
{h2:"Availability: The Nines",body:`<table class="comp-table"><thead><tr><th>Availability</th><th>Downtime / Year</th><th>Typical Use Case</th></tr></thead><tbody><tr><td>99% (two nines)</td><td>3.65 days</td><td>Internal tools, blogs</td></tr><tr><td>99.9% (three nines)</td><td>8.76 hours</td><td>E-commerce sites</td></tr><tr><td>99.99% (four nines)</td><td>52.6 minutes</td><td>Payment gateways</td></tr><tr><td>99.999% (five nines)</td><td>5.26 minutes</td><td>Hospitals, banking core systems</td></tr></tbody></table>`,callout:{type:"warn",title:"🏥 Why It Matters",body:"A hospital system going down for 8 hours can be life-threatening. A personal blog going down is inconvenient. Design your availability target based on how critical the system is — and know that every extra nine costs significantly more."}},
{h2:"Reliability vs. Availability",body:`<p>These are often confused but distinct concepts:</p><ul><li><strong>Availability</strong> — Is the system running and reachable?</li><li><strong>Reliability</strong> — When running, does it produce correct results?</li></ul><p>A system can be highly available (always up) but unreliable (giving wrong answers). A calculator that is always on but gives wrong results is available but not reliable. You need both.</p>`},
{h2:"Scalability: Up vs. Out",body:`<div class="code-block">Vertical Scaling (Scale Up):      Horizontal Scaling (Scale Out):

  [HUGE Server]                     [Server 1] [Server 2] [Server 3]
  (1 powerful machine)              (many smaller machines)

  Limit: hardware ceiling            Limit: almost unlimited
  Cost:  exponential                 Cost: linear
  HA:    single point of failure     HA:   redundant by nature
  
  Use for: databases (initially)     Use for: stateless app servers</div>`},
{h2:"Maintainability",body:`<p>Maintainability measures how easy it is to:</p><ul><li><strong>Operate</strong> — Run and monitor the system day-to-day</li><li><strong>Evolve</strong> — Add new features without breaking existing ones</li><li><strong>Debug</strong> — Find and fix problems quickly</li></ul><p>A maintainable system has good documentation, modular components, comprehensive logging, and clear ownership. This often matters more than raw performance.</p>`},
{h2:"Fault Tolerance Techniques",body:`<table class="comp-table"><thead><tr><th>Technique</th><th>How It Works</th></tr></thead><tbody><tr><td>Replication</td><td>Copy data and services across multiple nodes</td></tr><tr><td>Retry with backoff</td><td>Retry failed requests with increasing delays</td></tr><tr><td>Circuit Breaker</td><td>Stop calling a failing service to prevent cascade failures</td></tr><tr><td>Bulkhead</td><td>Isolate components so one failure can't sink everything</td></tr><tr><td>Checkpointing</td><td>Save progress periodically so recovery resumes from checkpoint</td></tr></tbody></table>`,callout:{type:"info",title:"✈️ Airplane Analogy",body:"Airplanes have redundant engines, navigation systems, and hydraulics. If one fails, others take over. In distributed systems, we replicate components so one failure does not bring down the entire system."}},
],quiz:[
{q:"A startup wants 99.9% availability. How much downtime per year does that allow?",opts:["52.6 minutes","8.76 hours","3.65 days","0 — 99.9% means always up"],correct:1,exp:"99.9% = 0.1% downtime. 0.001 × 365 × 24 = 8.76 hours/year. This is the three-nines SLA common for commercial web services."},
{q:"Netflix needs to handle 2× traffic spikes during major releases. Which scaling approach is most suitable?",opts:["Vertical — buy one huge server","Horizontal — add servers dynamically via auto-scaling","Neither — let some users wait","Database replication only"],correct:1,exp:"Horizontal auto-scaling adds servers when traffic spikes and removes them after. This is elastic and cost-effective. Vertical scaling hits hardware limits and doesn't give redundancy."},
]}},
{id:5,title:"Back-of-the-Envelope Calculations",tag:"Foundations",time:"16 min",content:{intro:"Before designing a system, you need to estimate its scale. These rough calculations help you choose the right architecture and justify your design decisions in interviews.",sections:[
{h2:"Essential Numbers to Memorize",body:`<table class="comp-table"><thead><tr><th>Unit</th><th>Value</th><th>Mental Model</th></tr></thead><tbody><tr><td>1 KB</td><td>1,000 bytes</td><td>One short email</td></tr><tr><td>1 MB</td><td>1,000 KB</td><td>One JPEG photo</td></tr><tr><td>1 GB</td><td>1,000 MB</td><td>One movie (compressed)</td></tr><tr><td>1 TB</td><td>1,000 GB</td><td>1,000 movies</td></tr><tr><td>1 PB</td><td>1,000 TB</td><td>YouTube daily upload volume</td></tr><tr><td>Memory latency</td><td>~100 ns</td><td>Almost instant</td></tr><tr><td>SSD read</td><td>~100 µs</td><td>1,000× slower than memory</td></tr><tr><td>Network round-trip</td><td>~50 ms</td><td>500,000× slower than memory</td></tr><tr><td>Seconds in a day</td><td>86,400</td><td>Memorize this for RPS calculations</td></tr></tbody></table>`},
{h2:"Worked Example: Twitter Scale",body:`<div class="code-block"><span class="code-lbl">ESTIMATION</span>Given: 300M monthly active users, 100M daily active, 2 tweets/user/day

Write throughput:
  Daily tweets   = 100M × 2         = 200M tweets/day
  Write RPS      = 200M / 86,400    ≈ 2,300 tweets/second

Storage per tweet:
  Text           = 280 chars        ≈ 280 bytes
  Metadata       = user_id, time…   ≈ 500 bytes
  Total          ≈ 1 KB per tweet

Daily storage (text only):
  200M × 1 KB = 200 GB/day
  Annual text  = 200 GB × 365 ≈ 73 TB/year

With media (10–100× multiplier):
  Annual total estimate: 730 TB → 7.3 PB/year

Read throughput:
  Users read ~50 tweets/day
  Read RPS = (100M × 50) / 86,400 ≈ 58,000 reads/sec

  Read : Write ratio ≈ 25:1 → optimize reads with caching!</div>`,callout:{type:"success",title:"💡 Key Insight",body:"Most systems are read-heavy. Twitter is ~25× more reads than writes. This immediately tells you: add Redis caches and CDNs for reads. Writes can go to a single primary database."}},
{h2:"Common Estimation Mistakes",body:`<ul><li><strong>Off by 1000×</strong> — confusing MB with GB, or KB with MB. Always double-check units.</li><li><strong>Forgetting replication</strong> — storage needs 3× multiplier for 3-replica redundancy</li><li><strong>Ignoring growth</strong> — estimate for 2–5 years out, not just today's traffic</li><li><strong>Assuming linear scaling</strong> — caches and indexes mean real systems often scale sublinearly</li></ul>`},
],quiz:[
{q:"Instagram users upload 100M photos/day at ~3 MB average. How much raw storage per year?",opts:["~110 TB/year","~1.1 PB/year","~10 PB/year","~30 TB/year"],correct:1,exp:"100M × 3 MB = 300 GB/day. 300 GB × 365 = ~109 TB ≈ 1.1 PB/year (before replication multiplier). This is why Instagram uses blob storage like Amazon S3, not a database."},
{q:"A server handles 500 RPS. How many servers for 100,000 RPS with 20% headroom?",opts:["200 servers","240 servers","100 servers","500 servers"],correct:1,exp:"100,000 / 500 = 200 servers at exact load. Add 20% headroom: 200 × 1.2 = 240 servers. Always provision extra capacity for traffic spikes."},
]}},
{id:6,title:"Building Blocks Overview",tag:"Core Components",time:"10 min",content:{intro:"Every large system is assembled from reusable building blocks. Understanding each one deeply is the foundation of system design. Think of them as LEGO pieces — you combine them differently for each system.",sections:[
{h2:"The Core Building Blocks",body:`<table class="comp-table"><thead><tr><th>Building Block</th><th>Purpose</th><th>Examples</th></tr></thead><tbody><tr><td>DNS</td><td>Translate domain names to IP addresses</td><td>Route 53, Cloudflare DNS</td></tr><tr><td>Load Balancer</td><td>Distribute traffic across servers</td><td>Nginx, AWS ALB, HAProxy</td></tr><tr><td>Database</td><td>Persistent structured data storage</td><td>MySQL, PostgreSQL, DynamoDB</td></tr><tr><td>Cache</td><td>Fast temporary data store</td><td>Redis, Memcached</td></tr><tr><td>CDN</td><td>Serve static content from edge servers</td><td>Cloudflare, Akamai, CloudFront</td></tr><tr><td>Message Queue</td><td>Async communication between services</td><td>Kafka, RabbitMQ, SQS</td></tr><tr><td>Blob Store</td><td>Store large unstructured files</td><td>Amazon S3, Google GCS</td></tr><tr><td>Rate Limiter</td><td>Prevent abuse and enforce quotas</td><td>API gateways, Redis counters</td></tr></tbody></table>`},
{h2:"How They Connect",body:`<div class="code-block">Typical Request Flow:

Browser → DNS (resolves domain)
       → CDN (serves cached static assets)
       → Load Balancer (distributes to healthy servers)
       → App Server (processes business logic)
       → Cache (fast reads: Redis)
       → Database (persistent reads/writes)
       → Message Queue (async: emails, notifications, analytics)
       → Blob Store (images, videos, documents)</div>`,callout:{type:"info",title:"🔑 Key Insight",body:"The rest of this course covers each building block in depth. Understanding them individually, and knowing when to combine them, is what lets you design any system confidently."}},
],quiz:[
{q:"You're building a photo-sharing app. Which building block is MOST critical for serving photos fast globally?",opts:["Message Queue","CDN","Rate Limiter","Sequencer"],correct:1,exp:"A CDN caches photos at edge servers worldwide, serving them from the nearest location. This reduces latency from 200ms to under 10ms — essential for any media-heavy application."},
]}},
{id:7,title:"Domain Name System (DNS)",tag:"Core Components",time:"13 min",content:{intro:"DNS is the internet's phone book. It translates human-readable domain names like 'google.com' into machine-readable IP addresses — and does so with a clever hierarchical architecture that handles billions of queries per day.",sections:[
{h2:"How DNS Resolution Works",body:`<div class="code-block">You type: www.google.com

Step 1: Browser cache         → Not found, continue
Step 2: OS cache              → Not found, continue
Step 3: Recursive Resolver    → Not found (your ISP's DNS)
Step 4: Root Name Server      → "Ask the .com TLD server"
Step 5: TLD Server (.com)     → "Ask Google's authoritative server"
Step 6: Google's Auth Server  → Returns: 142.250.80.46
Step 7: Browser connects      → Page loads!

Each result is cached at every level with a TTL (Time To Live).
Second user asking for google.com? Skip to cached step!</div>`},
{h2:"DNS Record Types",body:`<table class="comp-table"><thead><tr><th>Record Type</th><th>Purpose</th><th>Example</th></tr></thead><tbody><tr><td>A Record</td><td>Domain → IPv4 address</td><td>google.com → 142.250.80.46</td></tr><tr><td>AAAA Record</td><td>Domain → IPv6 address</td><td>google.com → 2607:f8b0::200e</td></tr><tr><td>CNAME</td><td>Domain → another domain (alias)</td><td>www → mysite.github.io</td></tr><tr><td>MX</td><td>Mail server for domain</td><td>google.com → mail.google.com</td></tr><tr><td>TXT</td><td>Text metadata (e.g., SPF verification)</td><td>v=spf1 include:google.com</td></tr></tbody></table>`},
{h2:"DNS in System Design",body:`<p>DNS does more than translate names. At scale it provides:</p><ul><li><strong>Load Balancing</strong> — Return different IPs for the same domain (round-robin DNS)</li><li><strong>Geo-routing</strong> — Return the nearest server's IP based on user location</li><li><strong>Health-based failover</strong> — Remove unhealthy server IPs automatically</li><li><strong>Traffic splitting</strong> — Route 10% to canary servers, 90% to stable</li></ul>`,callout:{type:"warn",title:"⚠️ Common Misconception",body:"DNS changes are NOT instant. A TTL of 3600 means users may get the old IP for up to 1 hour. Best practice before a migration: lower TTL to 60 seconds 24 hours in advance, make the change, then raise TTL back."}},
],quiz:[
{q:"A company changes their server IP. Users in some regions still get the old IP for several hours. Why?",opts:["The DNS server crashed","Old IP is cached due to TTL","The users' browsers are buggy","The load balancer is misconfigured"],correct:1,exp:"TTL (Time To Live) tells DNS resolvers how long to cache a result. If TTL was 3600 (1 hour), users see the old IP for up to 1 hour. Always lower TTL before planned IP changes."},
]}},
{id:8,title:"Load Balancers",tag:"Core Components",time:"14 min",content:{intro:"A load balancer distributes incoming traffic across multiple servers so no single server gets overwhelmed. It is the traffic cop of your infrastructure — and a critical component for both performance and fault tolerance.",sections:[
{h2:"Load Balancing Algorithms",body:`<table class="comp-table"><thead><tr><th>Algorithm</th><th>How It Works</th><th>Best For</th></tr></thead><tbody><tr><td>Round Robin</td><td>Rotate through servers in sequence</td><td>Servers with similar capacity, short requests</td></tr><tr><td>Weighted Round Robin</td><td>Bigger servers get more traffic proportionally</td><td>Mixed server sizes</td></tr><tr><td>Least Connections</td><td>Route to server with fewest active connections</td><td>Long-lived connections (WebSocket, file uploads)</td></tr><tr><td>IP Hash</td><td>Same client IP always goes to same server</td><td>Session-sticky applications</td></tr><tr><td>Least Response Time</td><td>Route to server with lowest measured latency</td><td>Latency-sensitive services</td></tr></tbody></table>`},
{h2:"Layer 4 vs. Layer 7 Load Balancing",body:`<table class="comp-table"><thead><tr><th>Type</th><th>Works At</th><th>Capability</th><th>Speed</th></tr></thead><tbody><tr><td>Layer 4 (Transport)</td><td>TCP/UDP level</td><td>Route by IP + port only</td><td>Very fast</td></tr><tr><td>Layer 7 (Application)</td><td>HTTP level</td><td>Route by URL path, headers, cookies, content</td><td>Slightly slower</td></tr></tbody></table><p>Example Layer 7 routing: <code>/api/*</code> routes to API servers, <code>/images/*</code> routes directly to image CDN, <code>/admin/*</code> routes to separate admin cluster.</p>`},
{h2:"Health Checks and Automatic Failover",body:`<div class="code-block">Load Balancer checks every 30 seconds:
  GET /health → Server 1: 200 OK     → HEALTHY ✓
  GET /health → Server 2: TIMEOUT    → UNHEALTHY ✗ (removed from pool)
  GET /health → Server 3: 200 OK     → HEALTHY ✓

When Server 2 recovers:
  GET /health → Server 2: 200 OK → re-added automatically ✓

Users experience: ~1-2 slow requests during failure, then seamless.</div>`,callout:{type:"success",title:"Zero-Downtime Failover",body:"This is how modern systems survive server crashes without user impact. The load balancer detects failure within seconds and stops routing there. Combined with auto-scaling, new servers spin up automatically."}},
{h2:"The Load Balancer as a Single Point of Failure",body:`<p>The load balancer itself can fail! Solution: Deploy load balancers in pairs with a virtual IP (VIP). If the active one fails, the passive one takes over in under a second using protocols like VRRP. Cloud-managed load balancers (AWS ALB, GCP LB) handle this for you automatically.</p>`},
],quiz:[
{q:"You're building a real-time chat app where each connection is long-lived. Which LB algorithm prevents sessions from being split across servers?",opts:["Round Robin","IP Hash / Sticky Sessions","Least Connections","Random"],correct:1,exp:"IP Hash always routes the same client IP to the same server. This keeps the user's connection on one server throughout the session — critical for stateful applications that store session data in memory."},
]}},
{id:9,title:"Databases Deep Dive",tag:"Core Components",time:"22 min",content:{intro:"The database is the heart of almost every system. Choosing the right type and configuring it correctly is one of the most impactful architectural decisions you will make.",sections:[
{h2:"SQL vs. NoSQL",body:`<table class="comp-table"><thead><tr><th>Feature</th><th>SQL (Relational)</th><th>NoSQL</th></tr></thead><tbody><tr><td>Structure</td><td>Tables with rows and columns</td><td>Documents, key-value, graphs, columns</td></tr><tr><td>Schema</td><td>Fixed — define upfront</td><td>Dynamic — add fields anytime</td></tr><tr><td>Scaling</td><td>Vertical primary; horizontal harder</td><td>Designed for horizontal scale</td></tr><tr><td>ACID Transactions</td><td>Yes — strong guarantees</td><td>Often eventual consistency</td></tr><tr><td>Best For</td><td>Financial data, user accounts, orders</td><td>Social feeds, catalogs, IoT, sessions</td></tr><tr><td>Examples</td><td>MySQL, PostgreSQL, SQLite</td><td>MongoDB, Cassandra, DynamoDB, Redis</td></tr></tbody></table>`,callout:{type:"info",title:"💡 Rule of Thumb",body:"Use SQL when you need complex queries, joins, and ACID transactions (money, orders, accounts). Use NoSQL when you need horizontal scale and flexible schemas (social feeds, product catalogs, sensor data)."}},
{h2:"Types of NoSQL Databases",body:`<table class="comp-table"><thead><tr><th>Type</th><th>Data Model</th><th>Best For</th><th>Example</th></tr></thead><tbody><tr><td>Key-Value</td><td>key → value (any format)</td><td>Sessions, caching, rate limiting</td><td>Redis, DynamoDB</td></tr><tr><td>Document</td><td>JSON-like nested documents</td><td>Product catalogs, user profiles</td><td>MongoDB, CouchDB</td></tr><tr><td>Column-Family</td><td>Rows with many sparse columns</td><td>Time-series, analytics, IoT</td><td>Cassandra, HBase</td></tr><tr><td>Graph</td><td>Nodes and edges (relationships)</td><td>Social networks, fraud detection</td><td>Neo4j, Amazon Neptune</td></tr></tbody></table>`},
{h2:"The CAP Theorem",body:`<p>In a distributed database, you can guarantee only <strong>2 of these 3</strong> properties:</p><ul><li><strong>C — Consistency:</strong> Every read gets the most recent write</li><li><strong>A — Availability:</strong> Every request receives a response</li><li><strong>P — Partition Tolerance:</strong> System continues despite network partitions</li></ul><p>Since network partitions always happen in real systems, you are really choosing between <strong>CP</strong> (consistent, may be briefly unavailable) or <strong>AP</strong> (always available, may be briefly stale).</p>`,callout:{type:"warn",title:"CAP in Practice",body:"Banks choose CP — your balance must be accurate even if the app is briefly unavailable. Social media feeds choose AP — it is fine to show a 30-second-old like count as long as the page loads instantly."}},
{h2:"Data Replication",body:`<table class="comp-table"><thead><tr><th>Strategy</th><th>How It Works</th><th>Trade-off</th></tr></thead><tbody><tr><td>Primary-Replica (Master-Slave)</td><td>One node handles all writes; replicas serve reads</td><td>Simple but primary is a bottleneck</td></tr><tr><td>Multi-Primary</td><td>Multiple nodes accept writes; conflicts resolved</td><td>Complex conflict resolution needed</td></tr><tr><td>Synchronous</td><td>Write confirmed only after all replicas confirm</td><td>Strong consistency, higher write latency</td></tr><tr><td>Asynchronous</td><td>Write confirmed on primary; replicas catch up</td><td>Lower latency, risk of stale reads</td></tr></tbody></table>`},
{h2:"Sharding: Splitting Data Across Servers",body:`<div class="code-block">Without Sharding:                  With Sharding (by User ID):

[All 1B users on 1 server]        [0–333M]   [333M–666M]  [666M–1B]
[Server OVERLOADED]                Shard 1     Shard 2      Shard 3

Sharding strategies:
  Range-based:  A-M → Shard 1, N-Z → Shard 2
                Risk: "hotspots" if one range is more popular
  
  Hash-based:   shard = hash(user_id) % num_shards
                Even distribution; re-sharding is expensive
  
  Directory:    Lookup table maps keys to shards
                Most flexible; lookup table can bottleneck</div>`},
],quiz:[
{q:"A fintech startup stores transaction records. Which database should they choose?",opts:["MongoDB (document store)","Redis (key-value)","PostgreSQL (relational SQL)","Cassandra (column-family)"],correct:2,exp:"Financial transactions require ACID guarantees — debiting Account A and crediting Account B must be atomic. PostgreSQL with strong consistency is the right choice. NoSQL databases often sacrifice these guarantees for speed."},
{q:"Your system needs to keep serving requests even during a network partition, accepting that some data may be slightly stale. Which CAP trade-off do you choose?",opts:["CP — Consistent + Partition Tolerant","CA — Consistent + Available","AP — Available + Partition Tolerant","None of the above"],correct:2,exp:"AP (Available + Partition Tolerant) means the system always responds, even during partitions, potentially with slightly stale data. This is what Cassandra, DynamoDB (with eventual consistency), and many high-availability systems choose."},
]}},
{id:10,title:"Key-Value Store Design",tag:"Core Components",time:"13 min",content:{intro:"Key-value stores are the simplest and fastest type of database. Designing one from scratch teaches foundational distributed systems concepts — consistent hashing, quorums, and versioning — that appear in interviews constantly.",sections:[
{h2:"Core Operations and Use Cases",body:`<div class="code-block">Operations:
  SET user:123  → { name:"Alice", age:30 }     (write)
  GET user:123  → { name:"Alice", age:30 }     (read)
  DEL user:123  → (deleted)                    (delete)
  TTL user:123 3600 → expires in 1 hour        (expiry)

Common use cases:
  • User sessions    SET session:abc → { userId:123, exp:1h }
  • Rate limiting    INCR rate:ip:1.2.3.4  (atomic increment)
  • Caching          SET db:query:hash → { result... }
  • Feature flags    GET feature:dark_mode → true/false
  • Leaderboards     ZADD leaderboard 9500 "Alice"</div>`},
{h2:"Consistent Hashing: Distributed Without Pain",body:`<div class="code-block">Naive hashing:  node = hash(key) % 3
  Add 4th server → rehash → 75% of keys must MOVE (catastrophic!)

Consistent Hashing:
  Place servers on a virtual ring (0 to 2^32)
  Each key hashes to the nearest server clockwise

        [Node A: 0°–90°]
       /                  \\
[Node D: 270°–360°]   [Node B: 90°–180°]
       \\                  /
        [Node C: 180°–270°]

  Add new node between A and B?
    Only ~25% of keys (A's range) need to move
  
  Remove a node? Only its keys move to the next node.
  Virtual nodes: each physical server gets multiple positions
  for even distribution.</div>`,callout:{type:"success",title:"Where This Is Used",body:"Consistent hashing powers Amazon DynamoDB, Apache Cassandra, Redis Cluster, Memcached, and many CDN systems. Mastering this one concept gives you huge leverage in system design interviews."}},
{h2:"Quorum: Balancing Consistency and Availability",body:`<p>With N replicas for each key, use quorum for reads and writes:</p><ul><li><strong>W</strong> = number of nodes that must confirm a write</li><li><strong>R</strong> = number of nodes that must respond to a read</li><li>For strong consistency: <strong>W + R &gt; N</strong></li></ul><div class="code-block">Example: N=3, W=2, R=2

Write: "user:123" → needs 2/3 nodes to confirm  ✓
Read:  "user:123" → reads from 2/3 nodes, returns newest version

W+R = 4 > 3 = N → strong consistency guaranteed

For high availability: W=1, R=1 (W+R=2, not > N=3 → eventual consistency)</div>`},
],quiz:[
{q:"Why is consistent hashing better than simple modulo hashing for distributed key-value stores?",opts:["It is faster to compute","Adding/removing nodes only moves a small fraction of keys","It uses less memory","It guarantees stronger consistency"],correct:1,exp:"With hash(key) % n_servers, adding one server remaps ~83% of all keys — catastrophic for a live system. Consistent hashing only moves ~1/n of keys per added server, enabling seamless scaling."},
]}},
{id:11,title:"Content Delivery Network (CDN)",tag:"Core Components",time:"12 min",content:{intro:"A CDN is a globally distributed network of servers that caches and delivers content to users from the nearest location — reducing latency from hundreds of milliseconds to single digits.",sections:[
{h2:"How a CDN Works",body:`<div class="code-block">Without CDN:                       With CDN:

User in India                      User in India
    |  (~200ms)                         |  (~10ms)
    v                                   v
[Origin Server - USA]             [CDN Edge - Mumbai]
                                        |
                               (cache miss → fetches from USA)
                               (cache hit  → serves immediately)

CDN edge servers: 100s of locations worldwide
Popular content cached: served locally
Unpopular content: proxied to origin on first request</div>`,callout:{type:"info",title:"🍕 Analogy",body:"A CDN is like a pizza chain with locations in every neighborhood. Instead of one central kitchen, each neighborhood has its own. Your pizza arrives hot because it is made nearby."}},
{h2:"Push vs. Pull CDN",body:`<table class="comp-table"><thead><tr><th>Type</th><th>How It Works</th><th>Best For</th></tr></thead><tbody><tr><td>Push CDN</td><td>You upload content to CDN in advance</td><td>Static assets that rarely change (videos, software downloads)</td></tr><tr><td>Pull CDN</td><td>CDN fetches from origin on first request, then caches</td><td>Dynamic websites where you can't predict all content upfront</td></tr></tbody></table>`},
{h2:"Cache Invalidation",body:`<table class="comp-table"><thead><tr><th>Strategy</th><th>How It Works</th><th>Trade-off</th></tr></thead><tbody><tr><td>TTL</td><td>Content expires after N seconds automatically</td><td>Simple but stale during the TTL window</td></tr><tr><td>Cache Purge API</td><td>Manually delete specific cached URL</td><td>Immediate but requires an API call per update</td></tr><tr><td>Versioned URLs</td><td>style.css → style-v3.css on every deploy</td><td>Old URL serves old file; never expires naturally</td></tr></tbody></table>`,callout:{type:"warn",title:"⚠️ Hot Tip",body:"For JavaScript and CSS files in production, always use versioned filenames or content-hash URLs (style.abc123.css). Set long TTLs (1 year). This gives both maximum cache efficiency and instant updates on deploy."}},
],quiz:[
{q:"Netflix serves 4K videos to users in 190 countries. What's the primary reason they use a CDN?",opts:["To reduce server costs by 50%","To serve videos from servers physically close to users, reducing buffering","To encrypt video content","To prevent video piracy"],correct:1,exp:"CDN edge servers cache video chunks near users globally. A user in Germany gets video from a Frankfurt edge server, not Los Gatos, CA. This reduces latency from 200ms to under 20ms — essential for smooth streaming."},
]}},
{id:12,title:"Sequencer & Unique ID Generation",tag:"Core Components",time:"11 min",content:{intro:"In distributed systems with many servers, how do you generate unique IDs without a central bottleneck? This is a deceptively hard problem that every large-scale system must solve.",sections:[
{h2:"Why Simple Auto-Increment Fails",body:`<p>A single database auto-increment (1, 2, 3…) seems simple but has critical problems at scale:</p><ul><li><strong>Bottleneck</strong> — all ID generation goes through one database</li><li><strong>Single point of failure</strong> — database down means IDs stop</li><li><strong>Not globally unique</strong> — two databases might both generate ID=1</li></ul><p>You need a way to generate millions of unique IDs per second, across hundreds of servers, without coordination.</p>`},
{h2:"Approaches Compared",body:`<table class="comp-table"><thead><tr><th>Approach</th><th>How It Works</th><th>Pros</th><th>Cons</th></tr></thead><tbody><tr><td>UUID v4</td><td>128-bit random number</td><td>Simple, no coordination</td><td>Large (16 bytes), not sortable by time, random lookups</td></tr><tr><td>Twitter Snowflake</td><td>64-bit: timestamp + machine ID + sequence</td><td>Compact, sortable, fast</td><td>Requires synchronized clocks</td></tr><tr><td>DB Auto-Increment</td><td>Single DB increments a counter</td><td>Simple, sortable</td><td>Single point of failure, bottleneck</td></tr><tr><td>Ticket Server (Flickr)</td><td>Dedicated DB server generates IDs</td><td>Sortable, centralized</td><td>Still a single point of failure</td></tr></tbody></table>`},
{h2:"Twitter Snowflake: The Gold Standard",body:`<div class="code-block">64-bit Snowflake ID Layout:

| 1 bit  | 41 bits          | 10 bits     | 12 bits          |
| unused | timestamp (ms)   | machine ID  | sequence counter |

Timestamp: milliseconds since Jan 1, 2010 (Twitter epoch)
Machine ID: 5 bits datacenter + 5 bits machine = 1024 machines
Sequence:   4096 IDs per millisecond per machine

Throughput: 4096 × 1000ms × 1024 machines = ~4 billion IDs/sec!

Sortability: Higher timestamp → higher ID value
  → IDs naturally sort chronologically in database indexes
  → "Recent tweets" queries are just a range scan on IDs</div>`,callout:{type:"success",title:"Why Sorting Matters",body:"When tweet IDs are sortable by time, fetching the latest 50 tweets is a simple range scan on the primary key. Non-sortable UUIDs require a separate timestamp index — slower and more expensive."}},
{h2:"Causality and Logical Clocks",body:`<p>Physical clocks drift in distributed systems. If Message A causes Message B (a reply), B must always appear after A — even if different servers' clocks disagree. Solutions:</p><ul><li><strong>Lamport Timestamps</strong> — logical counter, incremented on each event and message</li><li><strong>Vector Clocks</strong> — per-node counter array, captures full causal history</li></ul>`},
],quiz:[
{q:"A distributed system generates Snowflake IDs. Why can IDs be used to sort tweets chronologically without a separate 'created_at' column?",opts:["They can't — you always need a timestamp","The first 41 bits encode the timestamp, so higher ID always means later tweet","Twitter sorts manually after fetching","UUIDs are also sortable by time"],correct:1,exp:"Snowflake's 41-bit timestamp prefix means numerically larger IDs were created later. This makes the ID itself the sort key — fetching recent items is a cheap index range scan rather than a full sort on a separate column."},
]}},
{id:13,title:"Distributed Monitoring",tag:"Core Components",time:"15 min",content:{intro:"In a distributed system with 100 servers, when something goes wrong at 3am, how do you know? Monitoring is your system's nervous system — without it you are flying blind.",sections:[
{h2:"The Three Pillars of Observability",body:`<table class="comp-table"><thead><tr><th>Pillar</th><th>What It Captures</th><th>Example</th><th>Tools</th></tr></thead><tbody><tr><td>Metrics</td><td>Numerical measurements over time</td><td>CPU: 75%, Latency p99: 210ms</td><td>Prometheus, Datadog, CloudWatch</td></tr><tr><td>Logs</td><td>Timestamped event records</td><td>ERROR: DB connection failed at 03:14</td><td>ELK Stack, Loki, Splunk</td></tr><tr><td>Traces</td><td>End-to-end request journey</td><td>Request took 800ms: 10ms API + 790ms DB</td><td>Jaeger, Zipkin, AWS X-Ray</td></tr></tbody></table>`,callout:{type:"info",title:"💡 When to Use Which",body:"Metrics tell you WHAT is wrong (error rate spiked). Logs tell you WHAT HAPPENED (specific error messages). Traces tell you WHERE time is going (which service is slow). Use all three together for full observability."}},
{h2:"Monitoring Architecture",body:`<div class="code-block">Services (App, DB, Cache, Queue)
       |
[Metrics Agent on each server]  (collects CPU, mem, custom metrics)
       |
[Ingestion Pipeline]  (Kafka streams high-volume metrics)
       |
[Time-Series DB]  (Prometheus, InfluxDB — optimized for numeric data)
       |
[Visualization]  (Grafana dashboards — graphs, heatmaps, alerts)
       |
[Alert Manager]  → PagerDuty → SMS/Phone to on-call engineer</div>`},
{h2:"SLIs, SLOs, and SLAs",body:`<ul><li><strong>SLI</strong> (Service Level Indicator) — A metric you measure: "% of requests completing in &lt;200ms"</li><li><strong>SLO</strong> (Service Level Objective) — Your internal target: "95% of requests under 200ms"</li><li><strong>SLA</strong> (Service Level Agreement) — Customer contract: "We guarantee 99.9% uptime or credit your bill"</li></ul>`,callout:{type:"success",title:"Real Example",body:"SLI: API success rate. SLO: 99.9% success rate. SLA: If we drop below 99.5% in a month, customers get a 10% service credit. SLOs are stricter than SLAs — you want to catch issues internally before they breach the customer-facing guarantee."}},
{h2:"Structured Logging Best Practice",body:`<div class="code-block">Bad:  "ERROR: User 123 payment failed"

Good: {
  "level": "ERROR",
  "service": "payment-service",
  "userId": 123,
  "orderId": 456,
  "traceId": "abc-def-123",
  "error": "Card declined — insufficient funds",
  "timestamp": "2024-01-15T15:05:32.441Z"
}

Why JSON logs matter:
  → Machine-parseable: search by userId, traceId, error type
  → traceId links logs across services for one request
  → Dashboards and alerts built on structured fields</div>`},
],quiz:[
{q:"A user reports 'the checkout was slow at 3:05pm.' Which observability tool helps you find EXACTLY where the time was spent across 8 microservices?",opts:["Metrics (Prometheus)","Logs (Elasticsearch)","Distributed Traces (Jaeger/Zipkin)","CPU dashboards"],correct:2,exp:"Distributed traces follow a single request through every service with timing for each step. You'd see: API Gateway 5ms → Auth 10ms → Cart Service 12ms → Payment Service 773ms → done. Immediately pinpoints the bottleneck."},
]}},
{id:14,title:"Monitor Server-Side Errors",tag:"Core Components",time:"10 min",content:{intro:"Server-side monitoring catches infrastructure problems before users notice them. The goal is to detect, alert, and diagnose issues faster than users can report them.",sections:[
{h2:"Key Server Metrics to Monitor",body:`<table class="comp-table"><thead><tr><th>Metric</th><th>Warning Threshold</th><th>What It Signals</th></tr></thead><tbody><tr><td>CPU Utilization</td><td>&gt;70% sustained</td><td>Need to scale, or CPU-intensive bug</td></tr><tr><td>Memory Usage</td><td>&gt;80%</td><td>Memory leak or insufficient capacity</td></tr><tr><td>Error Rate (5xx)</td><td>&gt;0.1%</td><td>Application bugs or downstream service failing</td></tr><tr><td>P99 Latency</td><td>&gt;500ms</td><td>Database slow queries, network issues</td></tr><tr><td>DB Connection Pool</td><td>&gt;80% used</td><td>Connection exhaustion approaching</td></tr><tr><td>Disk Usage</td><td>&gt;75%</td><td>Log rotation or cleanup needed</td></tr></tbody></table>`},
{h2:"Designing the Monitoring System",body:`<div class="code-block">Pull-based (Prometheus model):
  Prometheus scrapes /metrics endpoint from each service
  + Each service controls what it exposes
  + Easy to add new metrics without reconfiguring collector
  - Services must expose HTTP endpoint

Push-based (StatsD / Datadog model):
  Services push metrics to central collector
  + Works for short-lived processes (lambdas, batch jobs)
  + Simpler service-side code
  - Collector becomes bottleneck if many services push simultaneously

Hybrid approach (recommended):
  Use pull for long-running services
  Use push for batch jobs and event-driven functions</div>`,callout:{type:"tip",title:"💎 Golden Signals",body:"Google SRE recommends monitoring exactly 4 signals for any service: Latency (how slow?), Traffic (how much?), Errors (what is failing?), Saturation (how full is the system?). If these 4 are healthy, your service is healthy."}},
],quiz:[
{q:"You notice P99 latency suddenly jumps from 50ms to 2 seconds but error rate stays at 0%. What is the most likely cause?",opts:["A complete service outage","A slow database query or lock contention — requests succeed but take much longer","A memory leak causing crashes","Network packet loss"],correct:1,exp:"High latency with low error rate typically means requests are succeeding but waiting — often a slow DB query, lock contention, or an external service that is slow but not failing. Distributed traces would pinpoint the exact step."},
]}},
{id:15,title:"Monitor Client-Side Errors",tag:"Core Components",time:"9 min",content:{intro:"Server metrics look healthy, but users are still complaining. Why? Because client-side errors — JavaScript crashes, slow page loads, failed network requests in the browser — are invisible to server monitoring.",sections:[
{h2:"What Client-Side Monitoring Captures",body:`<table class="comp-table"><thead><tr><th>Event Type</th><th>Example</th><th>Impact</th></tr></thead><tbody><tr><td>JavaScript Errors</td><td>TypeError: cannot read property of null</td><td>Feature broken for affected users</td></tr><tr><td>Page Load Time</td><td>Time to First Contentful Paint: 4.2s</td><td>High bounce rates if &gt;3 seconds</td></tr><tr><td>Core Web Vitals</td><td>LCP, FID, CLS scores</td><td>Affects Google search ranking</td></tr><tr><td>Failed API Calls</td><td>POST /checkout returned 503</td><td>Users cannot complete purchases</td></tr><tr><td>User Session Replays</td><td>Heatmaps, click paths, rage clicks</td><td>Reveals UX confusion and frustration</td></tr></tbody></table>`},
{h2:"Client-Side Monitoring Architecture",body:`<div class="code-block">Browser / Mobile App
    |
[Monitoring SDK]  (Sentry, Datadog RUM, Dynatrace)
    - Captures: JS errors, performance timings, user actions
    - Buffers locally (handles offline/slow connections)
    |
[Batched HTTP upload to Monitoring Service]
    |
[Error Aggregation]  (group similar errors, detect new vs. recurring)
    |
[Alert: "500 new users hit 'checkout crash' in last 5 minutes"]
    |
[Engineer sees: browser, OS, stack trace, session replay → fix!]</div>`,callout:{type:"success",title:"Real Impact",body:"Airbnb found that 60% of their JavaScript errors were happening on a specific old Android browser they weren't testing. Client-side monitoring revealed this in hours. Without it, they would have lost bookings from millions of users indefinitely."}},
],quiz:[
{q:"Your server metrics show 99.9% success rate and 50ms P99 latency, but conversion rate dropped 30%. What should you check?",opts:["Scale up your servers","Check client-side monitoring for JavaScript errors or slow rendering","Restart the database","Check DNS records"],correct:1,exp:"Healthy server metrics but poor business metrics (low conversion) is a classic sign of a client-side issue. A JavaScript crash on the checkout page would not show as a server error — the server successfully returned the page, but the browser-side code failed."},
]}},
{id:16,title:"Distributed Cache",tag:"Core Components",time:"15 min",content:{intro:"Caching is one of the highest-impact optimizations in system design. A well-designed cache can reduce database load by 90% and cut response times from hundreds of milliseconds to under 1 millisecond.",sections:[
{h2:"Cache Read Strategies",body:`<table class="comp-table"><thead><tr><th>Strategy</th><th>Flow</th><th>Best For</th></tr></thead><tbody><tr><td>Cache-Aside (Lazy Loading)</td><td>Check cache → miss → read DB → store in cache → return</td><td>General purpose — most common</td></tr><tr><td>Read-Through</td><td>Always read from cache; cache fetches DB on miss transparently</td><td>Simplified application code</td></tr><tr><td>Refresh-Ahead</td><td>Pre-populate cache before TTL expires</td><td>Predictable, frequently-accessed data</td></tr></tbody></table>`},
{h2:"Cache Write Strategies",body:`<table class="comp-table"><thead><tr><th>Strategy</th><th>Flow</th><th>Consistency</th></tr></thead><tbody><tr><td>Write-Through</td><td>Write to cache AND database simultaneously</td><td>High — cache always matches DB</td></tr><tr><td>Write-Behind (Write-Back)</td><td>Write to cache first; DB updated later asynchronously</td><td>Risk of data loss on crash</td></tr><tr><td>Write-Around</td><td>Write directly to DB, skip cache</td><td>Good for write-heavy, rarely-read data</td></tr></tbody></table>`},
{h2:"Cache Eviction Policies",body:`<ul><li><strong>LRU (Least Recently Used)</strong> — Evict item not accessed for longest. Most common. O(1) with a doubly-linked hashmap.</li><li><strong>LFU (Least Frequently Used)</strong> — Evict item accessed fewest times. Good for skewed access patterns.</li><li><strong>FIFO</strong> — Evict the oldest item. Simple but ignores access patterns.</li><li><strong>TTL-based</strong> — Items expire after a set time regardless of access. Good for time-sensitive data.</li></ul>`},
{h2:"Redis vs. Memcached",body:`<table class="comp-table"><thead><tr><th>Feature</th><th>Redis</th><th>Memcached</th></tr></thead><tbody><tr><td>Data Types</td><td>Strings, Lists, Sets, Sorted Sets, Hashes, Streams</td><td>Strings only</td></tr><tr><td>Persistence</td><td>Yes — RDB snapshots + AOF log</td><td>No — memory only</td></tr><tr><td>Replication + Clustering</td><td>Yes — Redis Cluster, Sentinel</td><td>No native support</td></tr><tr><td>Pub/Sub</td><td>Yes — built-in</td><td>No</td></tr><tr><td>Choose Redis for</td><td>Leaderboards, sessions, queues, real-time, rate limiting</td><td>Simple HTML fragment caching only</td></tr></tbody></table>`,callout:{type:"success",title:"When to Cache",body:"Cache when data is read much more than written, data does not need to be perfectly fresh, and DB reads are expensive. Rule of thumb: cache if your read:write ratio exceeds 5:1."}},
],quiz:[
{q:"Your e-commerce product page takes 800ms. Profiling shows 700ms is a DB query fetching product details. What is the fastest fix?",opts:["Rewrite the database in a faster language","Add Redis caching for product data with 5-minute TTL","Buy a bigger database server","Compress the HTML response"],correct:1,exp:"Product details rarely change. Caching them in Redis with a 5-minute TTL turns a 700ms DB query into a ~1ms cache read. This is often the single highest-ROI optimization in web systems."},
]}},
{id:17,title:"Distributed Messaging Queue",tag:"Core Components",time:"16 min",content:{intro:"Message queues decouple services and enable asynchronous communication. They are the secret weapon for building resilient, scalable systems that survive traffic spikes and service failures.",sections:[
{h2:"The Core Problem Solved",body:`<div class="code-block">WITHOUT Queue (synchronous, tightly coupled):

User places order → [Order Service]
    (waits 5+ seconds for all downstream calls)
    ├── [Email Service]
    ├── [Inventory Service]
    └── [Analytics Service]
    If ANY service is slow/down → user waits or sees error!

WITH Queue (asynchronous, decoupled):

User places order → [Order Service] → "order.placed" event → [Queue]
← Instant response!                                              |
                                              ┌──────────────────┤
                                              ↓          ↓       ↓
                                         [Email]  [Inventory] [Analytics]
                                    (each processes when ready, independently)</div>`,callout:{type:"info",title:"☕ Coffee Shop Analogy",body:"A message queue is like a coffee shop order ticket system. You order (produce a message) and the barista makes your drink when ready (consumes the message). You don't stand frozen at the counter waiting — you sit down. The ticket is the queue."}},
{h2:"Key Concepts",body:`<table class="comp-table"><thead><tr><th>Concept</th><th>Role</th></tr></thead><tbody><tr><td>Producer</td><td>Service that sends messages to the queue</td></tr><tr><td>Consumer</td><td>Service that reads and processes messages</td></tr><tr><td>Broker</td><td>The queue system itself (Kafka, RabbitMQ)</td></tr><tr><td>Topic / Queue</td><td>Named channel for a category of messages</td></tr><tr><td>Acknowledgment (ACK)</td><td>Consumer signals it successfully processed a message</td></tr><tr><td>Dead Letter Queue</td><td>Messages that failed processing after N retries go here for investigation</td></tr></tbody></table>`},
{h2:"Delivery Guarantees",body:`<table class="comp-table"><thead><tr><th>Guarantee</th><th>Description</th><th>Risk</th></tr></thead><tbody><tr><td>At-Most-Once</td><td>Delivered once, never re-sent on failure</td><td>Message loss on crash</td></tr><tr><td>At-Least-Once</td><td>Delivered once but may be re-sent on failure</td><td>Duplicate processing (use idempotency keys)</td></tr><tr><td>Exactly-Once</td><td>Delivered precisely once, guaranteed</td><td>Complex, slow — often an approximation</td></tr></tbody></table>`,callout:{type:"warn",title:"Idempotency is Key",body:"Most production systems use at-least-once delivery and make consumers idempotent — processing the same message twice produces the same result as processing it once. Example: payment processing checks if payment ID was already processed before charging."}},
{h2:"Apache Kafka Architecture",body:`<div class="code-block">Kafka Key Concepts:
  Topic:     Named category ("orders", "user-events")
  Partition: Topics split into parallel streams (e.g., 32 partitions)
  Offset:    Position of a message within a partition
  Consumer Group: Multiple consumers sharing partition reads

Benefits over traditional queues:
  • Log retention: replay events from any point in time
  • High throughput: millions of messages/second
  • Durable: messages persisted to disk, replicated
  • Decoupled: producers don't know who consumes</div>`},
],quiz:[
{q:"A payment service uses at-least-once delivery from a message queue. What MUST you implement to prevent charging customers twice?",opts:["Stronger encryption","Idempotency keys — check if payment ID was already processed","Faster servers","A second message queue"],correct:1,exp:"Idempotency keys prevent duplicate processing. Each payment request has a unique ID. Before processing, check if that ID was already used. If yes, return the cached result without re-charging. This is industry-standard in payment systems."},
]}},
{id:18,title:"Pub-Sub System",tag:"Core Components",time:"12 min",content:{intro:"Pub-Sub (Publish-Subscribe) is a messaging pattern where publishers send events to topics and subscribers receive all events on topics they care about — without knowing each other.",sections:[
{h2:"Pub-Sub vs. Message Queue",body:`<table class="comp-table"><thead><tr><th>Feature</th><th>Message Queue</th><th>Pub-Sub</th></tr></thead><tbody><tr><td>Consumers per message</td><td>One consumer processes each message</td><td>Many consumers each receive the message</td></tr><tr><td>Coupling</td><td>Producer knows about the queue</td><td>Producer knows only the topic</td></tr><tr><td>Use Case</td><td>Task processing (one worker handles the task)</td><td>Event broadcasting (notify many services)</td></tr><tr><td>Message retention</td><td>Deleted after consumption</td><td>Retained for all subscribers</td></tr></tbody></table>`,callout:{type:"info",title:"📰 Newspaper Analogy",body:"Pub-Sub is like a newspaper subscription. The newspaper (publisher) doesn't know who reads it. Subscribers choose which newspapers they want. Multiple subscribers get the same paper. Cancel anytime — the publisher is unaffected."}},
{h2:"Real-World Example: Instagram Notification",body:`<div class="code-block">User likes a photo → [Like Service]
                          |
               publishes "photo.liked" event
                          |
               [Pub-Sub Broker: Kafka]
                    /     |      \\
         [Notification] [Feed]  [Analytics]
          Service       Service  Service

Each subscriber processes the event independently.
Notification Service: sends push notification to photo owner
Feed Service: updates like counter in user feeds
Analytics Service: records engagement metrics

Without Pub-Sub: Like Service must call all 3 services directly.
Add a 4th subscriber? Like Service needs zero changes.</div>`},
{h2:"Designing a Pub-Sub System",body:`<div class="code-block">Components:
  Broker:       Kafka / Google Pub/Sub / AWS SNS
  Topics:       Named channels ("user.signup", "order.placed")
  Partitions:   Parallel streams within a topic for scale
  Subscribers:  Register interest in topics

Durability options:
  • At-least-once: message re-delivered if subscriber crashes
  • Message retention: keep messages 7 days (replay if subscriber is down)
  • Consumer groups: multiple instances of same service share the load</div>`},
],quiz:[
{q:"You add a new Email Service that needs to react to 'user.signup' events. Pub-Sub already handles this. How many code changes are needed in the existing services?",opts:["Change every service that triggers signups","Zero — just subscribe the new service to the user.signup topic","Add an API call from Auth Service to Email Service","Change the database schema"],correct:1,exp:"This is the key advantage of Pub-Sub. The Auth Service publishes 'user.signup' without knowing who will consume it. The new Email Service just subscribes to that topic. No existing code changes needed — perfect decoupling."},
]}},
{id:19,title:"Rate Limiter",tag:"Core Components",time:"13 min",content:{intro:"A rate limiter controls how many requests a user or service can make within a time window. It protects your system from abuse, DDoS attacks, and runaway clients.",sections:[
{h2:"Why Rate Limiting?",body:`<ul><li><strong>Prevent API abuse</strong> — bots scraping your data or brute-forcing passwords</li><li><strong>DDoS protection</strong> — absorb or deflect volumetric attacks</li><li><strong>Business rules</strong> — free plan: 100 req/day; paid: 10,000 req/day</li><li><strong>Protect downstream</strong> — prevent one noisy tenant from starving others</li><li><strong>Cost control</strong> — LLM APIs that cost per-token need hard limits</li></ul>`},
