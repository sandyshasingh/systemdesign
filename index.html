{h2:"Algorithms Compared",body:`<table class="comp-table"><thead><tr><th>Algorithm</th><th>How It Works</th><th>Allows Bursting?</th></tr></thead><tbody><tr><td>Token Bucket</td><td>Fill bucket at fixed rate; each request consumes 1 token</td><td>Yes — up to bucket capacity</td></tr><tr><td>Leaky Bucket</td><td>Requests queue up; processed at fixed outflow rate</td><td>No — strict output rate</td></tr><tr><td>Fixed Window Counter</td><td>Count requests per fixed time window (e.g., 60-second windows)</td><td>Yes — 2× at window boundaries</td></tr><tr><td>Sliding Window Log</td><td>Log all request timestamps; count in last N seconds</td><td>No — accurate but memory-heavy</td></tr><tr><td>Sliding Window Counter</td><td>Hybrid of fixed window + sliding; memory-efficient and accurate</td><td>Minimal</td></tr></tbody></table>`,callout:{type:"info",title:"Token Bucket in Detail",body:"Start with 100 tokens. Refill 10 tokens/second (max 100). Each request costs 1 token. A burst of 100 requests succeeds immediately. Then only 10 more per second. Most real systems (GitHub API, Stripe) use Token Bucket for this burst-friendly behavior."}},
{h2:"Distributed Rate Limiting with Redis",body:`<div class="code-block">Problem: 10 servers handling requests from User X.
Each server tracks its own count → User X can make
10× the intended limit across servers!

Solution: Shared Redis counter with atomic INCR:

Server 1: User X request → INCR "rl:user:X:minute:1704067260"
Server 2: User X request → INCR "rl:user:X:minute:1704067260"
         → Redis returns count=2 atomically
         → If count > limit: return 429 Too Many Requests

Key expires automatically after 1 minute (SET EX 60)
All servers see the same counter — accurate global rate limiting!</div>`},
],quiz:[
{q:"The Fixed Window Counter algorithm has a boundary condition vulnerability. What is it?",opts:["It uses too much memory","A user can make 2× the limit by sending requests at the end of one window and start of the next","It is too slow for high-traffic systems","It doesn't support distributed systems"],correct:1,exp:"With 100 req/min limit: send 100 requests at 00:59, then 100 more at 01:01. That's 200 requests in 2 seconds but both windows are within limits. Sliding window algorithms fix this by evaluating requests in a rolling time window."},
]}},
{id:20,title:"Blob Store Design",tag:"Core Components",time:"12 min",content:{intro:"A blob store is a system for storing large unstructured files — images, videos, backups, documents. Think Amazon S3, Google Cloud Storage, or Azure Blob Storage. Understanding how to design one is a common system design interview question.",sections:[
{h2:"Why Not a Regular Database?",body:`<table class="comp-table"><thead><tr><th>Feature</th><th>Regular Database</th><th>Blob Store</th></tr></thead><tbody><tr><td>Optimized For</td><td>Structured records, random access</td><td>Large sequential file reads/writes</td></tr><tr><td>Cost per GB</td><td>$0.10–0.50/GB/month (expensive)</td><td>$0.02–0.03/GB/month (cheap)</td></tr><tr><td>Max object size</td><td>Typically a few MB</td><td>5 TB per object (S3)</td></tr><tr><td>Scale</td><td>Terabytes practical</td><td>Exabytes (Amazon S3 stores trillions of objects)</td></tr></tbody></table>`},
{h2:"Blob Store Design",body:`<div class="code-block">Upload Flow:
  1. Client → POST /upload → API returns upload URL + blob ID
  2. Client → PUT video.mp4 → Storage cluster (direct, bypasses API)
  3. Large files split into 64 MB chunks (enables parallel upload)
  4. Each chunk replicated across 3 storage nodes (durability)
  5. Metadata (blob ID, chunks, URLs, size) stored in metadata DB

Download Flow:
  1. Client → GET /blob/{id} → API returns pre-signed URL
  2. Client → GET {presigned_url} → CDN edge server
  3. CDN cache HIT: serves directly (fast!)
  4. CDN cache MISS: fetches from storage cluster, caches

Pre-signed URL: time-limited URL with embedded auth token
  → Lets clients download directly without exposing credentials
  → Expires after 15 minutes → unauthorized access blocked</div>`,callout:{type:"success",title:"Deduplication",body:"If two users upload the same file, a blob store hashes each chunk (SHA-256) and stores only one copy. Instagram reportedly saved 50%+ storage costs through content-aware deduplication."}},
{h2:"Key Design Considerations",body:`<ul><li><strong>Chunking</strong> — Large files split for parallel upload, partial failure recovery, and efficient CDN caching</li><li><strong>Geo-replication</strong> — Store copies in multiple regions for global access and disaster recovery</li><li><strong>Storage tiers</strong> — Hot (frequent access, expensive), Warm (infrequent), Cold (archive, very cheap)</li><li><strong>Lifecycle policies</strong> — Auto-move objects to cheaper tiers after N days</li></ul>`},
],quiz:[
{q:"A user uploads a 10 GB video. During upload, the connection drops at 7 GB. What design feature allows resuming without re-uploading the first 7 GB?",opts:["HTTP retry headers","Chunked uploads — only the failed chunks need to be re-sent","Pre-signed URLs","CDN caching"],correct:1,exp:"Chunked uploads split the file into small pieces (e.g., 64 MB). Each chunk is uploaded and acknowledged separately. On connection drop, only the in-flight chunk needs to be re-sent — not the entire file. This is how YouTube, Dropbox, and S3 multipart uploads work."},
]}},
{id:21,title:"Distributed Search",tag:"Core Components",time:"14 min",content:{intro:"How does Google search billions of pages in 0.3 seconds? How does Twitter let you search 500 million tweets instantly? The answer is distributed search infrastructure built on inverted indexes.",sections:[
{h2:"The Inverted Index",body:`<div class="code-block">Regular index: document → words it contains
Inverted index: word → all documents containing it

Documents:
  Doc 1: "the quick brown fox"
  Doc 2: "the fox jumped high"
  Doc 3: "quick brown rabbit"

Inverted Index:
  "quick"  → [Doc 1, Doc 3]
  "fox"    → [Doc 1, Doc 2]
  "brown"  → [Doc 1, Doc 3]

Query: "quick fox"
  → "quick" matches [Doc 1, Doc 3]
  → "fox"   matches [Doc 1, Doc 2]
  → Intersection = [Doc 1] ← returned as result

This lookup is O(log n) instead of scanning every document!</div>`,callout:{type:"info",title:"Why It's Called 'Inverted'",body:"A regular (forward) index maps document ID to its words. An inverted index maps words back to document IDs — the mapping is inverted. It is specifically designed for fast full-text search."}},
{h2:"Distributed Search Architecture",body:`<div class="code-block">New Content Indexed:
[Documents] → [Tokenizer] → [Index Builder] → [Shard Index]

Index Sharding:
  Shard 1: terms A-F        Shard 2: terms G-M
  Shard 3: terms N-S        Shard 4: terms T-Z

Query Flow:
  User: "quick fox"
  [Query Broker] fans out to all shards in parallel
     Shard 1: no results for "quick" or "fox" in A-F terms
     Shard 2+: returns matching doc IDs with relevance scores
  [Result Merger] combines + re-ranks by relevance score
  [User sees ranked results in &lt;100ms]</div>`},
{h2:"Scaling Search",body:`<table class="comp-table"><thead><tr><th>Technique</th><th>How It Helps</th></tr></thead><tbody><tr><td>Horizontal sharding</td><td>Split the index — each shard handles a fraction of terms</td></tr><tr><td>Replication</td><td>Multiple replicas per shard for fault tolerance and parallel reads</td></tr><tr><td>Query result caching</td><td>Cache top-1000 queries in Redis (80% of searches are repeated)</td></tr><tr><td>Approximate indexing</td><td>Accept slight staleness — index updates lag by minutes, not milliseconds</td></tr></tbody></table>`},
],quiz:[
{q:"A search query for 'machine learning' runs against 8 index shards. How does the system handle this efficiently?",opts:["Query runs sequentially against each shard (shard 1, then 2, etc.)","Query fans out to all shards in parallel; a merger combines results","Only the shard containing 'm' terms is queried","The query is cached from a previous user"],correct:1,exp:"Parallel fan-out is essential for low-latency search. All shards are queried simultaneously. Each shard returns its top results with scores. A central merger re-ranks and deduplicates results from all shards. Total time = slowest single shard, not sum of all shards."},
]}},
{id:22,title:"Distributed Logging",tag:"Core Components",time:"11 min",content:{intro:"In a distributed system with 100 services, when something goes wrong, logs are scattered everywhere. Distributed logging brings them together so you can reconstruct exactly what happened.",sections:[
{h2:"The ELK Stack",body:`<table class="comp-table"><thead><tr><th>Component</th><th>Role</th><th>Tool</th></tr></thead><tbody><tr><td>Log Collection</td><td>Collect logs from every service and server</td><td>Fluentd, Logstash, Filebeat</td></tr><tr><td>Log Transport</td><td>Stream high-volume logs to storage</td><td>Kafka, Kinesis</td></tr><tr><td>Log Storage + Index</td><td>Store and index for fast full-text search</td><td>Elasticsearch</td></tr><tr><td>Visualization</td><td>Search, filter, dashboard, and alert on logs</td><td>Kibana, Grafana</td></tr></tbody></table>`,callout:{type:"success",title:"Distributed Tracing Integration",body:"Modern systems link logs across services with a shared Trace ID. Each log entry includes the same traceId for a given user request. In Kibana, search 'traceId:abc-123' to see all logs from every service for that single request, sorted by time."}},
{h2:"Log Architecture",body:`<div class="code-block">[Service A] → log file
[Service B] → log file   →  [Fluentd Agent]  →  [Kafka]
[Service C] → log file                               |
                                            [Elasticsearch]
                                                     |
                                              [Kibana UI]

Engineer investigates incident:
  Search: userId=123 AND level=ERROR AND timestamp > "15:00"
  → All errors for that user across all services in chronological order
  → Pinpoint exactly which service and line caused the issue</div>`},
{h2:"Log Levels and Best Practices",body:`<table class="comp-table"><thead><tr><th>Level</th><th>When to Use</th></tr></thead><tbody><tr><td>ERROR</td><td>Something failed and requires immediate attention</td></tr><tr><td>WARN</td><td>Something unexpected but recoverable happened</td></tr><tr><td>INFO</td><td>Normal operational milestones (request completed, job started)</td></tr><tr><td>DEBUG</td><td>Detailed diagnostic info — disabled in production by default</td></tr></tbody></table>`},
],quiz:[
{q:"You need to trace a slow checkout request through 12 microservices. What makes this possible in a distributed logging system?",opts:["All services write to the same log file","A Trace ID passed through every service call, included in every log entry","Timestamps are synchronized across services","Using the same logging library in every service"],correct:1,exp:"A Trace ID (UUID generated at the API gateway) is passed through every service call via HTTP headers. Each service includes it in every log entry. Searching for that Trace ID in Elasticsearch instantly shows all logs from all 12 services for that single request, in order."},
]}},
{id:23,title:"Distributed Task Scheduler",tag:"Core Components",time:"13 min",content:{intro:"A task scheduler manages background jobs that run at specific times or intervals: sending weekly newsletters, generating nightly reports, retrying failed payments, or cleaning up expired data.",sections:[
{h2:"What to Schedule",body:`<p>Common background tasks in production systems:</p><ul><li>Send weekly email newsletters every Monday 9am</li><li>Generate financial reports at midnight</li><li>Retry failed payment every hour for 24 hours then give up</li><li>Clean up expired user sessions every 30 minutes</li><li>Refresh caches before peak traffic hours</li><li>Send push notifications for scheduled reminders</li></ul>`},
{h2:"Task Scheduler Architecture",body:`<div class="code-block">[Service submits task]
    → POST /schedule { fn: "sendEmail", at: "2024-01-15T09:00Z", userId: 123 }
    → Task saved to [Task DB] with status: PENDING

[Scheduler Process] runs every minute:
    → SELECT tasks WHERE scheduled_at <= NOW() AND status = PENDING
    → Publishes each task to [Task Queue] (Kafka/Redis)
    → Updates status to: QUEUED

[Worker Pool] consumes from queue:
    → Execute task function
    → On success: UPDATE task SET status = DONE
    → On failure: UPDATE task SET status = FAILED, retries = retries + 1
    → After 3 retries: status = DEAD_LETTER → alert engineers</div>`,callout:{type:"warn",title:"Preventing Duplicate Execution",body:"In distributed systems, multiple scheduler instances might pick the same task simultaneously. Use optimistic locking: UPDATE tasks SET status='QUEUED' WHERE id=? AND status='PENDING' — only one process succeeds, others see 0 rows updated."}},
{h2:"Idempotency in Task Execution",body:`<p>Tasks must be designed to be <strong>idempotent</strong> — running them twice produces the same result as running once. This is critical because:</p><ul><li>Network failures may cause retries</li><li>Worker crashes may cause re-queuing of the same task</li><li>Exactly-once execution is nearly impossible to guarantee</li></ul><div class="code-block">Non-idempotent (BAD):
  "INSERT INTO emails (user_id, sent_at) VALUES (123, NOW())"
  Run twice → 2 emails sent, 2 database rows!

Idempotent (GOOD):
  "INSERT INTO emails (user_id, date) VALUES (123, '2024-01-15')
   ON CONFLICT (user_id, date) DO NOTHING"
  Run twice → 1 email sent, 1 database row!</div>`},
],quiz:[
{q:"Two scheduler instances both pick the same task at the same moment. How do you prevent double execution?",opts:["Use two separate task queues","Optimistic locking — only the first UPDATE from PENDING to QUEUED succeeds","Add a random delay before execution","Use a faster scheduler"],correct:1,exp:"Optimistic locking uses a conditional UPDATE: 'UPDATE tasks SET status=QUEUED WHERE id=X AND status=PENDING'. Only one instance will get 1 row updated (success). The second gets 0 rows updated and knows it lost the race. No locks held — just atomic SQL."},
]}},
{id:24,title:"Sharded Counters",tag:"Core Components",time:"10 min",content:{intro:"A tweet's like count sounds simple — just increment a number. But at Twitter scale, a viral tweet can receive 100,000 likes per second. A single database row can only handle ~1,000 writes/second. Sharded counters solve this.",sections:[
{h2:"The Problem with Simple Counters",body:`<div class="code-block">Simple counter:
  UPDATE tweets SET likes = likes + 1 WHERE tweet_id = 123

Problem: this requires a row-level lock on tweet 123.
At 100,000 likes/second:
  → 100,000 threads queue up for the same lock
  → Database melts, timeouts cascade, users see errors</div>`},
{h2:"Sharded Counter Solution",body:`<div class="code-block">Instead of 1 counter, use N shards:
  Update: choose random shard → INCR counter:tweet:123:shard:{0..9}
  Read:   SUM counter:tweet:123:shard:0 through shard:9

Example (N=10 shards, 100K likes/sec):
  Each shard handles only 10K writes/sec → easily manageable!

  shard:0 = 9,843     shard:5 = 10,201
  shard:1 = 10,034    shard:6 = 9,977
  ...
  Total = SUM of all 10 shards = 1,000,000 likes

Read latency: reading 10 shards adds ~1ms vs single read
  → Acceptable trade-off for massive write throughput</div>`,callout:{type:"success",title:"YouTube Uses Approximate Counts",body:"YouTube shows '1.2M views' not '1,234,567'. They round to significant figures for display. This removes the need for perfect real-time aggregation — periodic background jobs sum the shards every few minutes, updating a cached total."}},
{h2:"When to Use Sharded Counters",body:`<p>Use sharded counters when:</p><ul><li>Write rate exceeds ~1,000 increments/second per counter</li><li>Content can go viral (unpredictable traffic spikes)</li><li>Exact real-time counts are not required (approximate is fine)</li></ul><p>Real examples: YouTube view counts, Twitter likes, Reddit upvotes, Facebook reactions, Amazon product review counts.</p>`},
],quiz:[
{q:"A tweet goes viral with 500,000 likes/second. You have 100 shards. What is the write rate per shard?",opts:["500,000/sec per shard","5,000/sec per shard","1,000/sec per shard","50,000/sec per shard"],correct:1,exp:"500,000 total writes / 100 shards = 5,000 writes/second per shard. A Redis instance handles 100K+ writes/second, so each shard has plenty of headroom. This is the power of sharding — distribute load so no single component is overwhelmed."},
]}},
{id:25,title:"RESHADED — Putting It All Together",tag:"Interview Prep",time:"14 min",content:{intro:"You now know all the building blocks. RESHADED gives you the structured approach to combine them into a complete system design in a 45-minute interview.",sections:[
{h2:"Step-by-Step RESHADED",body:`<div class="code-block">Example prompt: "Design a URL Shortener like bit.ly"

R — Requirements (5 min)
  Functional:     shorten URLs, redirect, custom aliases, analytics
  Non-functional: 100M shortened/day, read:write=100:1, 99.99% uptime
  Out of scope:   user authentication, billing

E — Estimation (5 min)
  Write RPS = 100M / 86,400 ≈ 1,160/sec
  Read RPS  = 1,160 × 100  = 116,000/sec
  Storage   = 100M × 500B  = 50 GB/day → 182 TB in 10 years

S — Storage Schema (5 min)
  Table: urls
    id:          BIGINT (Snowflake ID)
    short_code:  VARCHAR(8)  UNIQUE INDEX
    long_url:    TEXT
    user_id:     BIGINT
    created_at:  TIMESTAMP
    expire_at:   TIMESTAMP (nullable)
    click_count: BIGINT

H — High-Level Design (10 min)
  [Client] → [DNS] → [CDN? No — redirects must be dynamic]
  → [Load Balancer] → [App Servers (stateless)]
  → [Redis Cache] → [MySQL DB] → [Analytics Queue]

A — API Design (5 min)
  POST /shorten  { url, custom_alias?, expire_days? }
  → 201: { shortUrl: "bit.ly/abc123" }
  
  GET /{shortCode}
  → 302: Location: https://original-long-url.com

D — Detailed Design (10 min)
  Short code generation: Snowflake ID → Base62 encode → 7 chars
  Cache: GET /{code} → check Redis first (TTL: 24h)
         Cache miss: DB query → store in Redis → redirect
  
E — Evaluation (5 min)
  Bottleneck: Redis handles 116K RPS easily (single node ~100K)
  DB: 1,160 writes/sec → primary DB is fine
  Cache hit rate target: >99% for popular links
  
D — Distinctive Features (5 min)
  Link expiration: background job deletes expired, sets cache TTL
  Analytics: async event to Kafka → ClickHouse for counts</div>`},
{h2:"Common Interview Checkpoints",body:`<ul><li><strong>After requirements</strong> — "Do these requirements match what you had in mind?"</li><li><strong>After estimation</strong> — "Based on this scale, I plan to use X and Y. Does that direction make sense?"</li><li><strong>After high-level design</strong> — "Should I dive deeper into the database design or the caching layer?"</li><li><strong>After detailed design</strong> — "I think the main bottleneck is X. Would you like me to address that?"</li></ul>`,callout:{type:"success",title:"What Interviewers Remember",body:"They remember how you handled uncertainty, whether you discussed trade-offs, and whether you were collaborative. A perfectly designed system presented without discussion scores lower than a good design that invites conversation."}},
],quiz:[
{q:"In RESHADED, you estimate that reads are 100× more than writes (116,000 RPS reads). What architectural decision does this directly drive?",opts:["Add more write replicas","Implement heavy caching with Redis to handle read load","Use a faster programming language","Add more CPU cores to the database"],correct:1,exp:"High read:write ratio directly means: add a cache layer. 116K reads/sec would overwhelm a single database, but Redis handles this easily with sub-millisecond response times. This is exactly the pattern: estimate → identify read-heavy → add cache."},
]}},
{id:26,title:"Design YouTube",tag:"Real Systems",time:"25 min",content:{intro:"YouTube serves 2 billion users with 500 hours of video uploaded every minute and 1 billion hours watched daily. Let us design a system that handles this scale.",sections:[
{h2:"Scale Estimation",body:`<div class="code-block"><span class="code-lbl">SCALE</span>Uploads: 500 hours/min → 30,000 hours/hour
Storage per hour HD video: ~2 GB × 5 quality levels = 10 GB/hr
Daily storage needed: 30,000 × 24 × 10 GB = 7.2 PB/day!

Views: 1B hours watched daily
Peak concurrent streams: ~700,000
Bandwidth at 1080p (5 Mbps each): 700K × 5 = 3.5 Tbps peak</div>`},
{h2:"Video Upload and Transcoding Pipeline",body:`<div class="code-block">[User uploads raw video]
       ↓
[Blob Store — temporary raw storage]
       ↓
[Message published to Transcoding Queue]
       ↓
[Transcoding Workers] (many in parallel)
   → 360p  (mobile, low bandwidth)
   → 720p  (standard)
   → 1080p (HD)
   → 4K    (premium)
   → Extract thumbnail frames
       ↓
[Each quality split into ~10-second chunks]
       ↓
[Chunks stored in Blob Store (S3-like)]
       ↓
[CDN ingestion — chunks pushed to edge servers globally]
       ↓
[Metadata DB: video_id, chunk URLs, duration, qualities, status]</div>`,callout:{type:"info",title:"Why Chunking?",body:"Splitting video into 10-second chunks enables: (1) parallel downloading of multiple chunks simultaneously, (2) seeking to any point without downloading the full video, (3) adaptive quality switching between chunks based on current network speed."}},
{h2:"Adaptive Bitrate Streaming (ABR)",body:`<p>YouTube uses HLS (HTTP Live Streaming) or MPEG-DASH. The player automatically adapts quality based on your connection:</p><ul><li>Excellent connection → 4K chunks served</li><li>Connection drops → switches to 720p → no buffering</li><li>Connection improves → gradually steps back up</li></ul><p>The player maintains a 30-second buffer. You only see buffering when seeking or when buffer empties faster than download speed.</p>`},
{h2:"Search and Recommendations",body:`<p>YouTube's search uses inverted indexes on video titles, descriptions, transcripts, and tags. The recommendation system uses:</p><ul><li>Watch history and session data (what you watched, for how long)</li><li>Collaborative filtering (users like you also watched X)</li><li>Content-based signals (similar topics, channels)</li><li>Engagement signals (likes, shares, comments, click-through rate)</li></ul>`},
],quiz:[
{q:"Why does YouTube transcode each video into multiple resolutions?",opts:["To save storage space","To support different devices and connection speeds via adaptive bitrate streaming","Google has too many servers to use","To add watermarks"],correct:1,exp:"A 4K video would buffer constantly on a mobile connection. Transcoding into multiple resolutions lets players automatically select the highest quality their connection can handle — this is Adaptive Bitrate Streaming (ABR)."},
{q:"A user with a bad connection starts watching a 1080p YouTube video. What happens automatically?",opts:["The video pauses and asks the user to lower quality","The player switches to a lower quality chunk mid-stream with no interruption","The video buffers indefinitely","YouTube sends a lower-quality re-encoded version of the whole video"],correct:1,exp:"ABR (Adaptive Bitrate) protocols like HLS work at the chunk level. The player monitors download speed and switches to the appropriate quality tier for each new 10-second chunk. The transition is seamless — no pause, no user action needed."},
]}},
{id:27,title:"Design Quora",tag:"Real Systems",time:"16 min",content:{intro:"Quora is a Q&A platform with 300 million monthly users. The key challenges are serving a personalized home feed, ranking answers by quality, and handling the fan-out problem for popular questions.",sections:[
{h2:"Core Data Schema",body:`<table class="comp-table"><thead><tr><th>Table</th><th>Key Columns</th></tr></thead><tbody><tr><td>users</td><td>user_id, name, email, bio, follower_count, credential_count</td></tr><tr><td>questions</td><td>question_id, user_id, text, topic_id, view_count, answer_count, created_at</td></tr><tr><td>answers</td><td>answer_id, question_id, user_id, text, upvotes, downvotes, created_at</td></tr><tr><td>topics</td><td>topic_id, name, follower_count</td></tr><tr><td>follows</td><td>follower_id, followee_type (user/topic), followee_id</td></tr></tbody></table>`},
{h2:"Feed Generation: Fan-out Strategy",body:`<table class="comp-table"><thead><tr><th>Approach</th><th>How It Works</th><th>Best For</th></tr></thead><tbody><tr><td>Fan-out on Write (Push)</td><td>When content posted, push to followers' pre-computed feeds</td><td>Normal users (few followers)</td></tr><tr><td>Fan-out on Read (Pull)</td><td>When user opens feed, query all followed topics/users</td><td>Power users (millions of followers)</td></tr><tr><td>Hybrid</td><td>Push for &lt;10K followers; pull for celebrities; merge at read time</td><td>Production systems like Quora</td></tr></tbody></table>`,callout:{type:"info",title:"Answer Ranking",body:"Quora's answer ranking considers: upvote/downvote ratio, author's credentials on the topic (a doctor answering medical questions), answer completeness (length, citations, images), recency, and personalization based on topics you follow."}},
{h2:"High-Level Architecture",body:`<div class="code-block">[User] → [API Gateway] → [Load Balancer]
                               |
          ┌────────────────────┼────────────────────┐
          ↓                    ↓                    ↓
   [Question Service]  [Answer Service]      [Feed Service]
          ↓                    ↓                    ↓
      [MySQL]              [MySQL]           [Redis Cache]
                                               (pre-built feeds)
                                                    ↓
                                         [Feed Generation Worker]
                                         (fan-out on write/read)</div>`},
],quiz:[
{q:"A famous doctor with 2M Quora followers posts an answer. With pure fan-out-on-write, what problem occurs?",opts:["The answer is lost","2M Redis feed lists must be updated immediately — massive write spike","The answer is not indexed for search","The doctor's account is rate-limited"],correct:1,exp:"Fan-out-on-write for 2M followers means 2M Redis LPUSH operations instantly. Even at 100K writes/second, that takes 20 seconds — unacceptable. Quora uses a hybrid: push for normal users, pull-merge for celebrities/popular topics."},
]}},
{id:28,title:"Design Google Maps",tag:"Real Systems",time:"20 min",content:{intro:"Google Maps is one of the most complex systems in existence — handling map rendering at every zoom level, routing across the entire globe, and real-time traffic from hundreds of millions of phones.",sections:[
{h2:"Map Tiles: Serving the World",body:`<div class="code-block">The world map is divided into tiles at different zoom levels:
  Zoom 0:  1 tile  = entire world (1 image)
  Zoom 1:  4 tiles = 4 hemispheres
  Zoom 10: 1,048,576 tiles = city blocks
  Zoom 20: ~1 trillion tiles = individual buildings

Total tiles: ~4.4 trillion!

Strategy: Pre-render all tiles → store in blob store → serve via CDN
  - Tiles are static images → perfect CDN cache candidates
  - Hit rate is very high (same cities queried constantly)
  - Changed map data → regenerate only affected tiles
  
Tile key: /tiles/{zoom}/{x}/{y}.png
  → CDN serves from nearest edge server
  → Cache hit rate: ~99% for popular zoom levels</div>`},
{h2:"Routing: Finding the Best Path",body:`<div class="code-block">Road network = weighted directed graph
  Nodes: intersections (~1 billion in world road network)
  Edges: road segments
  Weights: travel time (changes with traffic!)

Algorithms:
  Dijkstra's:        O(E log V) — too slow for global routing
  A* with heuristic: faster but still impractical at global scale
  
Hierarchical Routing (what Google uses):
  1. Pre-compute fast routes on highways (contracted graph)
  2. At query time: find fastest route from A to highway
  3. Take pre-computed highway route
  4. Find fastest route from highway to B
  
  Result: ~100ms routing across entire country</div>`,callout:{type:"info",title:"Contraction Hierarchies",body:"Google pre-computes a 'contracted' version of the road network where important roads are weighted as shortcuts. During routing, unimportant roads are pruned early. This reduces a billion-node graph to an effectively much smaller problem."}},
{h2:"Real-Time Traffic: Crowdsourced Data",body:`<p>Google Maps traffic data comes from:</p><ul><li><strong>Anonymous phone data</strong> — phones with Google Maps open send anonymized location at intervals</li><li><strong>Historical patterns</strong> — "This road is always slow at 8am on weekdays"</li><li><strong>Machine learning</strong> — Combines historical + real-time for ETA prediction</li><li><strong>User reports</strong> — Traffic incidents, accidents reported by users</li></ul>`},
{h2:"ETA Computation",body:`<p>ETA = sum of travel times on each road segment in the chosen route. But road weights change constantly with traffic.</p><ul><li>Base weight: historical average travel time for that road segment at this time of day</li><li>Real-time adjustment: +30% if live data shows congestion</li><li>ML model: trained on millions of historical trips to predict delay</li></ul>`},
],quiz:[
{q:"Why are map tiles served from a CDN instead of computed on-demand?",opts:["CDNs are more secure","Tiles are pre-rendered static images that rarely change — perfect for caching near users","CDNs can render maps faster","To prevent map copying"],correct:1,exp:"Map tiles are static PNG/WebP images (the road network doesn't change daily). Pre-rendering and serving from CDN achieves ~99% cache hit rate. Computing tiles on-demand for every user request at every zoom level would require enormous server capacity."},
]}},
{id:29,title:"Design Yelp (Proximity Service)",tag:"Real Systems",time:"15 min",content:{intro:"Yelp's core feature is finding businesses near you — restaurants, shops, services. This requires specialized geospatial search algorithms that cannot be solved with a simple SQL query.",sections:[
{h2:"The Proximity Search Problem",body:`<div class="code-block">Naive SQL approach (DO NOT USE):
  SELECT * FROM businesses
  WHERE sqrt(pow(lat - 37.78, 2) + pow(lng - (-122.41), 2)) < 0.01

Problem: Full table scan on 50 million businesses = seconds per query!

We need a spatial index that makes proximity search fast.</div>`},
{h2:"Geohash: The Efficient Solution",body:`<div class="code-block">Geohash divides the world into a grid of cells.
Each cell gets a short string code. Nearby locations share common prefixes.

User at (37.785, -122.408) in San Francisco:
  geohash = "9q8yy7"

Nearby cell at (37.786, -122.409):
  geohash = "9q8yy6"  (shares "9q8yy" prefix!)

Finding nearby businesses:
  1. Compute user's geohash: "9q8yyz"
  2. Find all businesses with prefix "9q8yy" (same grid cell + neighbors)
  3. 8 neighboring cells cover the full search area
  
  SQL: SELECT * FROM businesses WHERE geohash LIKE '9q8yy%'
  → Uses a regular string index → fast! O(log n)</div>`,callout:{type:"info",title:"Geohash Precision",body:"Geohash length determines precision. 4 chars = ~40km cell. 6 chars = ~1.2km cell. 8 chars = ~40m cell. For a restaurant finder, 6-character geohash covers the right radius. Adjust precision based on your search radius."}},
{h2:"Full Architecture",body:`<div class="code-block">[User with GPS] → [Location Service]
                       ↓
               [Geohash Index]  (in-memory or Redis)
                       ↓
               [Nearby Business IDs]
                       ↓
               [Business Service] → [Redis Cache] → [MySQL]
                       ↓
               [Review Service] → [Elasticsearch for text search]
                       ↓
               [Response: ranked nearby businesses]</div>`},
],quiz:[
{q:"A user searches for 'pizza near me' in San Francisco. The geohash for their location is '9q8yy'. What SQL query finds nearby pizzerias efficiently?",opts:["SELECT * FROM businesses WHERE type='pizza' ORDER BY distance ASC","SELECT * FROM businesses WHERE geohash LIKE '9q8yy%' AND type='pizza'","SELECT * FROM businesses WHERE lat BETWEEN 37.7 AND 37.8","SELECT * FROM businesses JOIN locations ON …"],correct:1,exp:"LIKE '9q8yy%' uses the string index on geohash to efficiently find all businesses in the same geohash cell and its neighbors. Then filter by type='pizza'. The string prefix match is O(log n) using a B-tree index — no full table scan needed."},
]}},
{id:30,title:"Design Uber",tag:"Real Systems",time:"22 min",content:{intro:"Uber matches 15 million daily trips with real-time GPS tracking of 5 million drivers. The core engineering challenge: processing 1 million location updates per second.",sections:[
{h2:"Scale Estimation",body:`<div class="code-block">15M trips/day = 174 trips/second average
5M active drivers updating GPS every 5 seconds
= 5,000,000 ÷ 5 = 1,000,000 location writes/second!

This is the core challenge. A traditional DB cannot handle this.
Solution: Redis + geohashing + WebSockets.</div>`},
{h2:"Driver Location Service",body:`<div class="code-block">[Driver App] sends GPS every 5 sec via WebSocket

Location Service:
  1. Receives (driverId, lat, lng, timestamp)
  2. Converts to geohash: (37.78, -122.41) → "9q8yy"
  3. HSET driver:{id} geohash "9q8yy" lat 37.78 lng -122.41 available 1
  4. EXPIRE driver:{id} 35  (removes if no update for 35 sec)

Find nearby available drivers:
  1. Rider location → geohash "9q8yz"
  2. SCAN Redis for driver:* WHERE geohash starts with "9q8y"
  3. Filter: available=1, vehicle_type matches
  4. Calculate precise distance for top candidates
  5. Rank by estimated pickup time (uses traffic data)</div>`,callout:{type:"success",title:"Why Redis + Geohash?",body:"Redis handles 100K+ writes/second per instance; clustered Redis achieves 1M+/sec. Geohashing turns 2D proximity search into prefix string matching — something Redis hashes handle in O(1). Together they are the perfect solution for real-time location at this scale."}},
{h2:"Matching Algorithm",body:`<ol><li>Rider requests ride with (lat, lng, vehicle_type)</li><li>System expands search radius: 500m → 1km → 2km until drivers found</li><li>Rank by estimated pickup time (not just distance — traffic matters)</li><li>Send ride offer to top driver via WebSocket (30-second timeout)</li><li>On decline or timeout → offer to next driver in ranked list</li><li>On acceptance → notify rider, start trip, begin GPS tracking of route</li></ol>`},
{h2:"Payment and Fraud Detection",body:`<p>After trip completion, the payment flow:</p><ul><li>Fare calculated server-side (distance × rate × surge multiplier)</li><li>Idempotency key prevents double charging on network retries</li><li>Fraud detection ML model analyzes: GPS trace patterns, driver-rider collusion signals, abnormal routes, payment anomalies</li></ul>`},
],quiz:[
{q:"Why does Uber use WebSockets instead of HTTP polling for driver location updates?",opts:["WebSockets are more secure","WebSockets maintain persistent bidirectional connections — zero overhead for continuous GPS streaming","WebSockets use less GPS battery","HTTP doesn't support GPS coordinates"],correct:1,exp:"HTTP polling (GET /location every 5 seconds) wastes bandwidth on connection setup overhead for each request. WebSocket keeps one persistent connection — the driver's app just sends GPS coordinates over the open socket. 10× less overhead, zero latency for updates."},
]}},
{id:31,title:"Design Twitter",tag:"Real Systems",time:"22 min",content:{intro:"Twitter's home timeline — showing tweets from all accounts you follow in real-time — is one of the hardest engineering problems at scale. Understanding the fan-out problem and its solution is essential for system design interviews.",sections:[
{h2:"The Fan-Out Problem",body:`<div class="code-block">You follow 500 people. Each tweets ~2×/day = 1,000 tweets/day for you.

NAIVE APPROACH (Fan-out on Read):
  SELECT tweets FROM users 
  WHERE user_id IN (your 500 followed IDs)
  ORDER BY created_at DESC LIMIT 50;
  
  At 150M users opening the app daily:
  150M complex JOIN queries = database melts!

PUSH APPROACH (Fan-out on Write):
  When @alice tweets:
    Push tweet_id to Redis list for each follower
    timeline:{followerId} = [tweet_id_1, tweet_id_2, ...]
  
  Opening Twitter = just read your Redis list (O(1)!)
  → Twitter targets &lt;100ms home timeline load</div>`,callout:{type:"warn",title:"⚠️ Celebrity Problem",body:"Fan-out on write fails for celebrities. When a user with 150M followers tweets, you'd need 150M Redis list writes immediately — a massive spike that would overwhelm the system for minutes. Solution: celebrities use fan-out on READ instead."}},
{h2:"The Hybrid Solution",body:`<table class="comp-table"><thead><tr><th>User Type</th><th>Strategy</th><th>Why</th></tr></thead><tbody><tr><td>Normal users (&lt;10K followers)</td><td>Fan-out on Write (push to Redis timeline lists)</td><td>Fast writes, instant O(1) reads</td></tr><tr><td>Celebrity (&gt;10K followers)</td><td>Fan-out on Read (pull tweets at read time)</td><td>Avoids millions of writes per tweet</td></tr><tr><td>Your timeline</td><td>Pre-built list + merge celebrity tweets at read time</td><td>Best of both worlds</td></tr></tbody></table>`},
{h2:"Tweet Storage",body:`<div class="code-block">Tweets table (MySQL — relational for structured data):
  tweet_id  BIGINT PRIMARY KEY  (Snowflake ID — sortable by time!)
  user_id   BIGINT INDEX
  content   VARCHAR(280)
  media_url VARCHAR(512)        (points to blob storage)
  created_at TIMESTAMP           (redundant with tweet_id but explicit)
  
  Sharded by tweet_id % num_shards
  Read replicas for read-heavy operations</div>`},
],quiz:[
{q:"A celebrity with 50M followers tweets. With pure fan-out-on-write, what is the problem?",opts:["Nothing — 50M writes complete instantly","50M Redis writes must happen near-simultaneously — minutes of delay for the tweet to appear in all timelines","The tweet is automatically delayed","The tweet is only sent to active followers"],correct:1,exp:"50M Redis list writes at 100K writes/second takes 500 seconds = over 8 minutes! A tweet from a major celebrity must appear in timelines near-instantly. This is why Twitter uses a hybrid approach — celebrities are pulled at read time, not pushed at write time."},
]}},
{id:32,title:"Design Newsfeed System",tag:"Real Systems",time:"16 min",content:{intro:"A newsfeed shows a personalized, ranked stream of content from your connections. This is the core feature of Facebook, LinkedIn, and Instagram. The engineering challenge is generating a relevant, fresh feed for billions of users efficiently.",sections:[
{h2:"Newsfeed Requirements",body:`<ul><li>Show posts from friends, pages, and groups you follow</li><li>Ranked by relevance (not just chronological)</li><li>Updated in near-real-time (seconds, not minutes)</li><li>Paginated efficiently (infinite scroll)</li><li>Handle read:write ratio of ~100:1</li></ul>`},
{h2:"Feed Generation Pipeline",body:`<div class="code-block">[User creates post]
       ↓
[Fan-out Service]
  → Checks follower count
  → &lt;10K followers: push to each follower's feed (Redis list)
  → &gt;10K followers: mark post in "celebrity posts" table
       ↓
[Redis Feed Lists]
  feed:{userId} = [postId_1, postId_2, ..., postId_500]
  (Keep only latest 500 posts per user)
       ↓
[Feed Ranking Service] (runs at read time)
  Takes raw feed → applies ML ranking model:
  → Recency score (newer posts ranked higher initially)
  → Engagement prediction (will this user like this post?)
  → Relationship strength (close friend vs. distant acquaintance)
  → Content type preference (user watches more videos)
       ↓
[Paginated response to client]</div>`,callout:{type:"info",title:"Feed Ranking Is a Product Decision",body:"Chronological feed (Twitter's old default) is simple but noisy. Ranked feed (Facebook, Instagram) shows what you care about most but can feel manipulative. Many platforms now let users toggle between ranked and chronological — build support for both."}},
{h2:"Handling Offline Users",body:`<p>If a user hasn't opened the app in 7 days:</p><ul><li>Their Redis feed list may be stale or evicted (Redis uses LRU)</li><li>On next open: trigger an on-demand feed generation (fan-out on read)</li><li>This is more expensive but happens infrequently</li></ul>`},
],quiz:[
{q:"A user opens their feed and the Redis list is empty (evicted due to inactivity). What happens?",opts:["The user sees an empty feed","Fall back to fan-out-on-read: query the database for recent posts from followed users","The system crashes","Show a cached feed from 7 days ago"],correct:1,exp:"Robust feed systems detect an empty or stale cache and fall back to an on-demand database query (fan-out on read). This is slower but correct. The result is then stored back in Redis for subsequent requests. This graceful degradation prevents showing empty feeds."},
]}},
{id:33,title:"Design Instagram",tag:"Real Systems",time:"18 min",content:{intro:"Instagram handles photo/video uploads, follow graphs, stories, and a personalized feed for 2 billion users. The photo storage and CDN architecture is a masterclass in blob store design.",sections:[
{h2:"Photo Upload Flow",body:`<div class="code-block">[User selects photo on phone]
       ↓
[App compresses to multiple sizes locally] (mobile processing)
       ↓
[Upload to Blob Store (Amazon S3)]
  → Upload original: s3://instagram/photos/user:123/photo:abc.jpg
       ↓
[Message published: "photo.uploaded" → Kafka]
       ↓
[Media Processing Workers]
  → Generate resized versions:
     Thumbnail:     150×150 px  → ~15 KB
     Feed preview:  612×612 px  → ~80 KB
     Full view:     1080×1080 px → ~300 KB
     Original:      varies       → preserve for downloads
       ↓
[All versions stored in S3]
[CDN distribution: push popular users' content to edge servers]</div>`,callout:{type:"success",title:"Progressive Loading",body:"Instagram uses a blurred 2KB placeholder image while the full photo loads. This 2KB blur is embedded directly in the feed API response (base64 encoded), so it appears instantly. The full image then loads over the network and replaces the blur."}},
{h2:"Stories: Disappear After 24 Hours",body:`<div class="code-block">Implementation:
  1. Story uploaded → stored in blob store with metadata in Redis
     SETEX story:{storyId} 86400 {userId, mediaUrl, timestamp}
     (TTL = 24 hours → Redis auto-deletes after expiry)
  
  2. Stories feed = sorted set per user
     ZADD stories:{viewerId} {timestamp} {storyId}
     
  3. Background cleanup job:
     Runs hourly → deletes expired story media from S3
     (Redis TTL handles metadata, job handles actual media files)
     
  4. "Seen" tracking:
     SADD story:{storyId}:views {viewerId}
     (Set stores unique viewers — efficient for view count)</div>`},
{h2:"Follow Graph and Feed",body:`<p>Instagram's follow graph is stored in a combination of:</p><ul><li><strong>MySQL</strong> — persistent follow relationships (user_id, followee_id, created_at)</li><li><strong>Redis</strong> — follower counts and pre-computed friend lists for fast fan-out</li><li><strong>Neo4j (or similar)</strong> — used for "People you may know" graph recommendations</li></ul>`},
],quiz:[
{q:"Instagram generates 4 different sized versions of every uploaded photo. Why not just store the original and resize on-demand?",opts:["On-demand resizing is impossible","Pre-generating saves compute at read time — images are read 1000× more than written","Storage is free, so why not","To apply different filters to each size"],correct:1,exp:"Photos are read 1000× more than uploaded. On-demand resizing at 1000 reads per write would waste enormous compute. Pre-generating all sizes at upload time (write-once) means every read just fetches the pre-sized image from S3/CDN — instant and cheap."},
]}},
{id:34,title:"Design TinyURL",tag:"Real Systems",time:"14 min",content:{intro:"A URL shortener converts long URLs into short codes and redirects users. It is a classic system design question because it covers ID generation, caching, database design, and redirect HTTP mechanics.",sections:[
{h2:"Scale Estimation",body:`<div class="code-block">100M URLs shortened per day
Read:Write = 100:1

Write RPS = 100M / 86,400 ≈ 1,160/sec
Read RPS  = 1,160 × 100 = 116,000/sec

Storage per URL: ~500 bytes (short code + long URL + metadata)
Daily storage:   100M × 500B = 50 GB/day
10-year storage: 50 GB × 365 × 10 ≈ 182 TB</div>`},
{h2:"Generating Short Codes",body:`<div class="code-block">Approach: Base62 encode a Snowflake ID

Base62 charset: a-z, A-Z, 0-9 = 62 characters
7 characters:   62^7 = 3.5 trillion unique codes ✓✓

Process:
  1. Generate 64-bit Snowflake ID: e.g., 8,234,567,890
  2. Encode to base62:  8,234,567,890 → "9aB3xZ2"
  3. Store: short_code="9aB3xZ2" → long_url="https://very-long..."
  
Why not MD5 hash?
  MD5("https://example.com") → take first 7 chars
  Problem: hash collisions! Two URLs → same short code
  Requires collision detection + retry logic → complex</div>`,callout:{type:"info",title:"Base62 vs. Base64",body:"Base64 uses +, /, = characters which cause issues in URLs. Base62 (letters + digits only) is URL-safe by design. 7 base62 characters give 3.5 trillion combinations — enough for centuries of URL shortening."}},
{h2:"Redirect: 301 vs. 302",body:`<table class="comp-table"><thead><tr><th>Code</th><th>Meaning</th><th>Browser Caches?</th><th>Analytics?</th></tr></thead><tbody><tr><td>301 Permanent Redirect</td><td>This URL will always redirect here</td><td>Yes — future requests go direct</td><td>Lost — browser skips TinyURL</td></tr><tr><td>302 Temporary Redirect</td><td>This URL redirects for now</td><td>No — always calls TinyURL</td><td>Tracked — every click counted</td></tr></tbody></table>`},
{h2:"System Design",body:`<div class="code-block">POST /shorten { url, custom_alias? }
  → Generate short_code (Snowflake → Base62)
  → Store in MySQL + cache in Redis
  → Return: { shortUrl: "bit.ly/9aB3xZ2" }

GET /9aB3xZ2
  → Check Redis cache (TTL: 24 hours)
  → Cache HIT: 302 redirect (sub-millisecond!)
  → Cache MISS: MySQL query → cache → 302 redirect
  → Async: publish click event to analytics queue</div>`},
],quiz:[
{q:"A user visits bit.ly/abc. The system returns a 302 redirect. What happens on the user's SECOND visit to the same short URL?",opts:["Same 302 from TinyURL (browser always asks)","301 is returned on second visit","Browser caches the 302 — goes directly to destination (skips TinyURL)","An error because 302 is not cacheable"],correct:0,exp:"302 redirects are NOT cached by browsers by default (unlike 301). Every visit to a 302 short URL calls the TinyURL servers again. This enables click analytics but means more server load. 301 would cache and skip TinyURL after first visit."},
]}},
{id:35,title:"Design Web Crawler",tag:"Real Systems",time:"16 min",content:{intro:"A web crawler systematically browses the internet to discover and index web pages. Google's crawler visits billions of pages to build its search index. Designing one tests your understanding of queues, deduplication, and politeness.",sections:[
{h2:"Core Crawling Algorithm",body:`<div class="code-block">1. Start with seed URLs: [google.com, wikipedia.org, ...]
2. Fetch HTML for each URL
3. Parse HTML: extract links → <a href="...">
4. Deduplicate: is this URL already crawled or in queue?
5. If new: add to URL Frontier (priority queue)
6. Store fetched content in blob store
7. Pass to indexer for search index
8. Goto step 2 with next URL from Frontier

URL Frontier: priority queue considering:
  - Domain authority (important sites crawled more often)
  - Freshness (news sites crawled hourly, blogs monthly)
  - Politeness (max 1 request/second per domain)</div>`},
{h2:"Architecture",body:`<div class="code-block">[URL Frontier] (priority queue in Redis/Kafka)
      ↓
[Fetcher] — checks robots.txt — downloads HTML — respects delays
      ↓
[Parser] — extracts links, text, metadata
      ↓
[Deduplicator] — Bloom filter (URL seen before?)
      ↓               ↓
[Link Extractor]  [Content Store] — blob store for raw HTML
      ↓
[New URLs] → back to URL Frontier</div>`,callout:{type:"info",title:"Bloom Filter for Deduplication",body:"With billions of URLs, you cannot store every seen URL in memory. A Bloom filter uses ~1 GB of memory to track billions of URLs with zero false negatives (never reports 'not seen' for a seen URL) and a tiny false positive rate (~0.1%). Perfect for deduplication."}},
{h2:"robots.txt: The Crawling Contract",body:`<div class="code-block">Every site can have /robots.txt defining crawl rules:

User-agent: Googlebot
Allow: /
Disallow: /private/
Crawl-delay: 1   (wait 1 second between requests)

User-agent: *    (applies to all crawlers)
Disallow: /admin/
Disallow: /login

Well-behaved crawlers ALWAYS check robots.txt first.
Ignoring robots.txt can result in IP bans and legal issues.</div>`},
{h2:"Crawl Traps to Avoid",body:`<ul><li><strong>Spider traps</strong> — Infinite URLs via parameters: ?page=1, ?page=2, ?page=∞ — detect by setting max depth</li><li><strong>Duplicate content</strong> — Same page at different URLs (http vs https, www vs non-www) — normalize URLs first</li><li><strong>Dynamic URLs</strong> — Session IDs in URLs create infinite unique paths — use URL patterns to deduplicate</li></ul>`},
],quiz:[
{q:"A crawler visits ?page=1, ?page=2, ?page=3 and discovers the site generates infinite page numbers. What is this called and how do you handle it?",opts:["A DDoS attack — report to authorities","A spider trap — detect by limiting max crawl depth per domain","A robots.txt violation — ignore all pages","A CDN misconfiguration"],correct:1,exp:"Spider traps generate infinite unique URLs, causing a crawler to loop forever. Defense strategies: maximum crawl depth per domain, URL fingerprinting (detect parameterized variations), maximum pages per domain per crawl cycle, and URL normalization to collapse duplicates."},
]}},
{id:36,title:"Design WhatsApp",tag:"Real Systems",time:"20 min",content:{intro:"WhatsApp delivers 100 billion messages per day to 2 billion users with end-to-end encryption. The key challenges are real-time delivery, offline storage, and true end-to-end encryption that even WhatsApp cannot break.",sections:[
{h2:"Real-Time Messaging with WebSockets",body:`<div class="code-block">HTTP Polling (inefficient):
  Alice: "Any messages?" every 5 seconds
  Server: "No", "No", "No", "No", "Yes! Here's Bob's message"
  Wasted: 4 out of 5 requests return nothing
  Latency: up to 5 seconds for message delivery

WebSocket (efficient):
  Alice connects once: persistent bidirectional connection
  Bob sends "Hey!" → Server instantly pushes to Alice (<100ms)
  Alice sends "Hi!" → Server instantly pushes to Bob
  
  1 connection maintained vs. constant reconnections
  Near-zero latency for message delivery</div>`,callout:{type:"info",title:"Connection Management at Scale",body:"WhatsApp with 2B users cannot keep 2B WebSocket connections open simultaneously (most users are on mobile and frequently disconnect). The system must handle graceful reconnection — when Alice opens the app, she connects, downloads queued messages, and maintains connection while app is in foreground."}},
{h2:"End-to-End Encryption (Signal Protocol)",body:`<div class="code-block">Key Exchange (one-time setup):
  Alice generates: public key (shared openly) + private key (secret)
  Bob generates:   public key (shared openly) + private key (secret)

Sending a message from Alice to Bob:
  1. Alice encrypts message with Bob's public key
  2. Encrypted blob sent to WhatsApp server
  3. Server stores/routes encrypted blob (cannot read it!)
  4. Bob downloads encrypted blob
  5. Bob decrypts with his private key

WhatsApp's servers see only: who ↔ who, when, size
WhatsApp CANNOT hand over message contents — they don't have them.</div>`},
{h2:"Message Delivery Status",body:`<table class="comp-table"><thead><tr><th>Status</th><th>Indicator</th><th>What Triggered It</th></tr></thead><tbody><tr><td>Sent</td><td>✓ (single grey)</td><td>Server received and stored the message</td></tr><tr><td>Delivered</td><td>✓✓ (double grey)</td><td>Bob's device downloaded the message</td></tr><tr><td>Read</td><td>✓✓ (double blue)</td><td>Bob opened the conversation</td></tr></tbody></table>`},
{h2:"Offline Message Storage",body:`<div class="code-block">Bob is offline when Alice sends a message:
  1. Server stores encrypted message (in DynamoDB with TTL=30 days)
  2. Sends push notification via APNs (iOS) or FCM (Android)
     → Bob's phone wakes up (even if app is closed)
  
Bob comes online:
  3. Bob's app connects via WebSocket
  4. Server delivers all queued messages
  5. Bob's app sends delivery receipt for each
  6. Server updates status to "Delivered" ✓✓
  7. Server deletes its copy of the message (respects E2E privacy)</div>`},
],quiz:[
{q:"Bob is offline when Alice sends him a message. What happens to the message?",opts:["It is permanently lost","Alice must resend when Bob comes online","Server stores the encrypted message and delivers when Bob reconnects","It is broadcast to all of Bob's contacts"],correct:2,exp:"WhatsApp stores encrypted messages on servers for up to 30 days while the recipient is offline. When Bob reconnects, all queued messages are delivered, Bob's device sends delivery receipts, and the server deletes its stored copies."},
]}},
{id:37,title:"Design Typeahead Suggestion",tag:"Real Systems",time:"15 min",content:{intro:"Typeahead (autocomplete) shows search suggestions as you type. When you type 'sys' in Google, it instantly suggests 'system design', 'system requirements', etc. Designing this requires the right data structure and efficient caching.",sections:[
{h2:"The Trie Data Structure",body:`<div class="code-block">A Trie (prefix tree) is perfect for prefix matching.
Each node = one character. Path from root = a word.

Storing: "system", "systems", "systematic", "search"

        [root]
          |
         [s]
        /   \\
      [y]   [e]
       |       \\
      [s]      [a]
       |         \\
      [t]        [r]
       |           \\
      [e]          [c]
     / \\             \\
   [m] [m]           [h] ← "search"
    |    |
   end  [s] ← "systems"
  "system"
  
Query "sys": traverse s→y→s → return all words in subtree</div>`,callout:{type:"info",title:"Trie vs. Database",body:"A SQL LIKE 'sys%' query uses a B-tree index but still reads many rows. A Trie navigates directly to the 'sys' node in O(length of query) then fetches all completions. For real-time autocomplete needing sub-10ms responses, Trie wins."}},
{h2:"Ranking Suggestions",body:`<ul><li><strong>Query frequency</strong> — "system design" searched 10M times/day ranks above "systematic botany"</li><li><strong>Recency weighting</strong> — trending queries from last 24 hours boosted</li><li><strong>Personalization</strong> — your own recent searches appear first</li><li><strong>Geography</strong> — regional queries (sports teams, local news) boosted for local users</li></ul>`},
{h2:"System Architecture",body:`<div class="code-block">[Search Logs] (billions/day)
       ↓
[Log Aggregator] (MapReduce job, runs hourly)
  → Count queries by frequency for past 7 days
       ↓
[Trie Builder Service]
  → Builds Trie with top-N completions per node
  → Each node stores: top 10 completions + frequency scores
       ↓
[Trie Storage] (serialized to blob store)
       ↓
[Typeahead Service] (loads Trie into RAM)
  → GET /suggest?prefix=sys → traverse Trie → return top 5
  → &lt;5ms response time from in-memory Trie

Caching: top 1000 prefixes cached in Redis separately
  (80% of typeahead requests are for top-1000 prefixes)</div>`},
],quiz:[
{q:"A user types 'sys'. How does the Trie find completions efficiently?",opts:["Scan all nodes in the Trie","Traverse s→y→s in O(3) steps, then collect all words in the subtree","Send a SQL query with LIKE 'sys%'","Return a cached response (always)"],correct:1,exp:"Trie traversal is O(length of prefix) to reach the node. From that node, collect all words in the subtree (BFS/DFS). This is O(prefix length + number of completions) — much faster than scanning all words alphabetically or using SQL LIKE queries at scale."},
]}},
{id:38,title:"Design Google Docs",tag:"Real Systems",time:"18 min",content:{intro:"Google Docs allows multiple users to edit the same document simultaneously, with all changes reflected in real-time across all clients. The core challenge is handling concurrent edits without conflicts.",sections:[
{h2:"The Concurrent Editing Problem",body:`<div class="code-block">Document: "Hello World"

User A (at position 6): delete "World"
User B (at position 6): insert "Beautiful "

If applied in sequence (A then B):
  After A: "Hello "
  After B: "Hello Beautiful "  ← correct!

If applied in sequence (B then A):
  After B: "Hello Beautiful World"
  After A: delete at position 6 → "Hello "  ← WRONG! Deletes "Beautiful"

Problem: The same operation means different things depending
on what other operations happened concurrently.</div>`,callout:{type:"warn",title:"Why This Is Hard",body:"In a distributed system, there is no global clock. Users A and B both see 'Hello World' at the same instant and make changes. Neither knows about the other's change until after they've committed it. Any correct solution must handle this uncertainty."}},
{h2:"Operational Transformation (OT)",body:`<div class="code-block">OT transforms operations to account for concurrent operations:

  Op A: delete(position=6, length=5) — delete "World"
  Op B: insert(position=6, text="Beautiful ")

  Server receives A first, then B.
  Before applying B, transform it against A:
    B' = transform(B, A)
    Since A deleted 5 chars at pos 6, B's insertion
    position adjusts: B' = insert(position=6, text="Beautiful ")
    (Position unchanged here — after deletion, 6 is correct)

  Result: "Hello Beautiful "  ← same for all users ✓

Used by: Google Docs, SharePoint, Apache Wave</div>`},
{h2:"CRDT: The Modern Alternative",body:`<p>Conflict-Free Replicated Data Types (CRDTs) are mathematical data structures that merge changes automatically without conflicts, regardless of order.</p><ul><li>Each character gets a globally unique ID (not just a position)</li><li>Characters are always identified by their ID, not their position</li><li>Insertions and deletions use IDs — no position shift problems</li><li>Used by: Figma, Notion, Linear, Atom Teletype</li></ul>`},
{h2:"Real-Time Architecture",body:`<div class="code-block">[User A edits]
    ↓ WebSocket
[Collaboration Server]
    ↓ transform/apply operation
[Operation Log DB] ← all operations stored in order
    ↓ broadcast
[User B] ← sees update in &lt;100ms

Periodic snapshotting:
  Every 100 operations → save full document state
  Recovery: load latest snapshot + replay operations since snapshot
  (Avoids replaying thousands of operations on document open)</div>`},
],quiz:[
{q:"User A deletes 'World' at position 6. User B inserts 'Beautiful' at position 6. Both are concurrent. What technique ensures all users converge to the same document state?",opts:["Last-write-wins (most recent timestamp)","Operational Transformation (transform B against A before applying)","Locking (only one user can edit at a time)","Full document replacement on each keystroke"],correct:1,exp:"Operational Transformation transforms concurrent operations so they apply correctly regardless of arrival order. The server transforms each operation against all concurrent operations it has not yet seen. All clients eventually apply the same transformed sequence and converge to identical documents."},
]}},
{id:39,title:"Design Deployment System",tag:"Real Systems",time:"13 min",content:{intro:"A code deployment system automates getting code from a developer's laptop to production servers safely and reliably. Modern CI/CD pipelines are the backbone of fast-moving engineering teams.",sections:[
{h2:"CI/CD Pipeline",body:`<div class="code-block">Developer pushes code to GitHub
        ↓
[CI: Continuous Integration]
  ├── Run unit tests (must pass)
  ├── Run integration tests
  ├── Static analysis (linting, security scan)
  └── Build Docker container image
        ↓
[Artifact Registry] (Docker Hub, AWS ECR)
  → Immutable image tagged with git commit hash
        ↓
[CD: Continuous Deployment]
  ├── Deploy to Staging environment
  ├── Run smoke tests and E2E tests
  └── If all pass → proceed to production
        ↓
[Gradual Production Rollout]</div>`,callout:{type:"success",title:"Immutable Artifacts",body:"Every build produces an immutable Docker image tagged with the exact git commit hash (e.g., myapp:abc1234). You can deploy or rollback to ANY commit instantly by referencing its tag. This is fundamental to safe deployments."}},
{h2:"Deployment Strategies",body:`<table class="comp-table"><thead><tr><th>Strategy</th><th>How It Works</th><th>Rollback Speed</th><th>Risk</th></tr></thead><tbody><tr><td>All-at-Once</td><td>Deploy to all servers simultaneously</td><td>Slow (re-deploy old version)</td><td>Very high — all users affected</td></tr><tr><td>Rolling</td><td>Deploy to one server at a time</td><td>Medium</td><td>Medium — partial exposure</td></tr><tr><td>Blue-Green</td><td>Deploy to idle env; switch traffic at once; old env is instant rollback</td><td>Instant (switch back)</td><td>Low</td></tr><tr><td>Canary</td><td>Deploy to 1%, monitor, then 10%, 50%, 100%</td><td>Instant (remove canary)</td><td>Minimal — &lt;1% users initially</td></tr></tbody></table>`},
{h2:"Feature Flags",body:`<p>Feature flags let you deploy code without activating it. You separate deploy from release:</p><ul><li>Deploy new checkout flow code to production (disabled by flag)</li><li>Enable for 1% of users → monitor metrics</li><li>Enable for 10% → A/B test against old flow</li><li>Enable 100% → feature fully launched</li><li>If issues: disable flag instantly without re-deploying</li></ul>`},
],quiz:[
{q:"You deploy a new version and immediately see error rate spike. What deployment strategy enables instant rollback with zero additional deployment time?",opts:["Rolling deployment — roll forward one server at a time","Blue-Green deployment — just shift traffic back to the old environment","Canary deployment — remove the 1% canary","All-at-once — redeploy the old version"],correct:1,exp:"Blue-Green maintains two identical environments. The 'old' environment is kept running after deploying to 'new'. On error, you shift traffic back to old in seconds — no redeployment needed. The old environment becomes the fallback. This is the fastest possible rollback."},
]}},
{id:40,title:"Design a Payment System",tag:"Real Systems",time:"17 min",content:{intro:"Payment systems handle real money — errors mean financial loss, regulatory violations, and loss of customer trust. The non-negotiable requirements are idempotency, ACID guarantees, and security compliance.",sections:[
{h2:"Payment Flow Architecture",body:`<div class="code-block">[User clicks Pay $99]
       ↓
[Payment Service]
  1. Validate amount, currency, user authentication
  2. Check idempotency key (prevent duplicate charge!)
  3. Create payment record: { status: PENDING, amount: 99, currency: USD }
       ↓
[Payment Gateway] (Stripe, Adyen, Braintree)
  → Tokenize card (never store raw card numbers — PCI DSS!)
  → Route to Card Network (Visa/Mastercard)
       ↓
[Issuing Bank] (customer's bank)
  → Is card valid? Sufficient funds?
  → Returns: APPROVED or DECLINED
       ↓
[Payment Service]
  → UPDATE payment SET status = SUCCESS / FAILED
  → Publish "payment.completed" event → Kafka
       ↓
[Order Service, Email Service, etc.] consume event</div>`},
{h2:"Idempotency: The Most Critical Property",body:`<div class="code-block">Scenario: Network timeout after charge but before response.
  Without idempotency: retry → double charge → customer complaint!

With idempotency keys:
  Request:
    POST /charge
    Idempotency-Key: "order-789-attempt-1"  ← unique per request
    { amount: 99, currency: USD, card_token: "tok_abc" }

  First attempt:
    Key "order-789-attempt-1" not seen → charge → store result
    Response: { status: success, charge_id: "ch_123" }

  Retry (same key):
    Key "order-789-attempt-1" already exists → return stored result
    Response: { status: success, charge_id: "ch_123" }  (no new charge!)

Customer is NEVER charged twice.</div>`,callout:{type:"warn",title:"Stripe Uses This",body:"Stripe's API requires an Idempotency-Key header for all POST requests. They store results for 24 hours. Any retry with the same key returns the original result without re-processing. This is now considered industry-standard for payment APIs."}},
{h2:"PCI DSS Compliance",body:`<ul><li><strong>Never store raw card numbers</strong> — use payment gateway tokenization</li><li><strong>Encrypt all cardholder data</strong> at rest and in transit</li><li><strong>Audit logging</strong> — every access to payment data logged and monitored</li><li><strong>Network segmentation</strong> — payment servers isolated from rest of infrastructure</li><li><strong>Annual audits</strong> — third-party security assessments required</li></ul>`},
{h2:"Reconciliation",body:`<p>Every night, your payment records are compared against the bank/gateway records. Discrepancies are investigated and resolved. This is how financial systems ensure no money is lost or incorrectly processed.</p>`},
],quiz:[
{q:"A mobile app user taps Pay, the charge succeeds, but the response never reaches the app due to a network error. The app retries. What prevents double charging?",opts:["The bank rejects duplicate amounts","Idempotency key — server detects same key and returns original result without re-charging","The payment gateway automatically prevents this","The user's session expires"],correct:1,exp:"The idempotency key (a unique UUID generated before the first attempt) is sent with every retry. The server checks if that key was already processed. If yes, it returns the stored result without re-executing the charge. This is the definitive solution to the double-charge problem."},
]}},
{id:41,title:"Design ChatGPT System",tag:"AI Systems",time:"18 min",content:{intro:"Designing an LLM-powered conversational system like ChatGPT introduces unique challenges — GPU infrastructure, streaming responses, context window management, and extreme computational cost per request.",sections:[
{h2:"What Makes LLM Systems Different",body:`<table class="comp-table"><thead><tr><th>Traditional API</th><th>LLM API</th></tr></thead><tbody><tr><td>Responds in &lt;100ms</td><td>Generates for 2–30+ seconds</td></tr><tr><td>Runs on CPU servers ($0.001/server/hour)</td><td>Requires GPU clusters (A100: $3/hour each)</td></tr><tr><td>Stateless — each request independent</td><td>Stateful — full conversation history sent each request</td></tr><tr><td>Scales linearly with request count</td><td>GPU allocation and batching is complex</td></tr><tr><td>$0.000001/request</td><td>$0.001–0.10/request (1000–100,000× more expensive)</td></tr></tbody></table>`},
{h2:"Streaming with Server-Sent Events",body:`<div class="code-block">Without streaming:
  User: "Write a 500-word essay on distributed systems"
  [User watches blank screen for 30 seconds]
  [Full 500-word essay appears at once]

With streaming (what ChatGPT uses):
  User: "Write a 500-word essay on distributed systems"
  [Text appears word by word as the model generates it]
  → Users can read while generation continues
  → Can interrupt if direction is wrong
  → Perceived latency drops from 30s to &lt;1s

SSE Implementation:
  HTTP response stays open with Content-Type: text/event-stream
  Server sends:  data: {"token": "Distributed "}\n\n
  Server sends:  data: {"token": "systems "}\n\n
  ...
  Server sends:  data: [DONE]\n\n</div>`,callout:{type:"success",title:"Streaming Improves Perceived Performance",body:"Streaming does not make generation faster — it makes waiting feel faster. The time-to-first-token drops from 30s to under 1s. This single UX improvement dramatically increases user satisfaction and task completion rates."}},
{h2:"Context Window Management",body:`<p>LLMs have a maximum context window (GPT-4: 128K tokens, ~96K words). Long conversations require management:</p><table class="comp-table"><thead><tr><th>Strategy</th><th>How It Works</th><th>Trade-off</th></tr></thead><tbody><tr><td>Sliding Window</td><td>Keep only the last N messages</td><td>Loses early context</td></tr><tr><td>Summarization</td><td>Periodically summarize old messages</td><td>Summary may lose details</td></tr><tr><td>RAG (Retrieval)</td><td>Vector search retrieves relevant past messages</td><td>Most accurate but complex</td></tr></tbody></table>`},
{h2:"GPU Batching and KV Cache",body:`<p>To maximize expensive GPU utilization:</p><ul><li><strong>Request batching</strong> — Group multiple users' requests onto the same GPU pass (higher throughput)</li><li><strong>KV Cache</strong> — Cache the model's internal computation for the prompt; only compute new tokens incrementally (dramatic speedup for long conversations)</li><li><strong>Speculative decoding</strong> — Small draft model generates tokens quickly; large model verifies in parallel (faster generation)</li></ul>`},
],quiz:[
{q:"Why does ChatGPT stream responses word by word instead of waiting for the full answer?",opts:["The model generates one word at a time and cannot batch","Streaming makes waiting feel faster — perceived latency drops from 30s to under 1s","To save server bandwidth","It prevents users from copying the response"],correct:1,exp:"LLMs generate tokens sequentially (each depends on previous). Streaming sends each token to the browser as generated. Total generation time is identical, but users see text appearing immediately instead of waiting 30 seconds for the full response — dramatically better UX."},
]}},
{id:42,title:"Data Infrastructure for AI/ML",tag:"AI Systems",time:"16 min",content:{intro:"AI and machine learning require massive amounts of clean, organized data. The data infrastructure that collects, stores, processes, and serves this data is as important as the models themselves.",sections:[
{h2:"The Modern Data Stack",body:`<div class="code-block">Data Sources:
  Applications, User Behavior, Databases, IoT Sensors, 3rd-party APIs
       ↓
[Data Ingestion Layer]
  Batch:     Fivetran, Airbyte (scheduled syncs)
  Streaming: Kafka, Kinesis (real-time events)
       ↓
[Data Lake] — Raw storage (Amazon S3, Google GCS)
  • All data, all formats (JSON, CSV, Parquet, images, video)
  • Cheap storage, schema-on-read
  • Source of truth for everything
       ↓
[Data Processing]
  Batch:     Apache Spark, Databricks (large transformations)
  Streaming: Apache Flink (real-time aggregations)
       ↓
[Data Warehouse] — Cleaned, structured (Snowflake, BigQuery)
  • Optimized for analytical queries
  • Schema-on-write, columnar storage
  • BI tools connect here
       ↓
   ┌──────────────────┐
[Analytics/BI]    [ML Training → Feature Store → Model Registry]
                              ↓
                    [ML Serving: REST API or batch inference]`,callout:{type:"info",title:"Data Lake vs. Data Warehouse",body:"Data Lake: raw, any format, cheap, for data scientists. Data Warehouse: cleaned, structured, fast queries, for business analysts. Most companies need both — lake for flexibility, warehouse for performance."}},
{h2:"Feature Store",body:`<p>A feature store is a central repository of ML input features shared across models:</p><ul><li><strong>Training-serving consistency</strong> — Models trained and served on identical features, no skew</li><li><strong>Reusability</strong> — Feature "user_avg_purchase_last_30_days" computed once, used by 20 models</li><li><strong>Online serving</strong> — Real-time feature retrieval (&lt;10ms) for live predictions</li><li><strong>Offline serving</strong> — Historical feature retrieval for model training</li></ul>`,callout:{type:"warn",title:"Training-Serving Skew",body:"Training-serving skew occurs when features computed during training differ from features at serving time. Example: training used Python pandas to compute average; serving used a different formula. This silently degrades model accuracy. A feature store with shared computation logic prevents this."}},
{h2:"ML Model Lifecycle",body:`<table class="comp-table"><thead><tr><th>Stage</th><th>Description</th><th>Tools</th></tr></thead><tbody><tr><td>Data Preparation</td><td>Clean, transform, split into train/test</td><td>Spark, dbt, Great Expectations</td></tr><tr><td>Feature Engineering</td><td>Create ML-ready features from raw data</td><td>Feast (feature store), Tecton</td></tr><tr><td>Model Training</td><td>Train model on GPU/CPU cluster</td><td>PyTorch, TensorFlow, SageMaker</td></tr><tr><td>Model Registry</td><td>Version and track trained models</td><td>MLflow, Weights & Biases</td></tr><tr><td>Model Serving</td><td>Deploy model behind REST API</td><td>Triton, TorchServe, BentoML</td></tr><tr><td>Monitoring</td><td>Detect model drift and data drift</td><td>Evidently AI, Arize</td></tr></tbody></table>`},
],quiz:[
{q:"A model trained last month now gives poor predictions. The data it was trained on had 'user_country' as a feature, but the production system now sends a different country code format. What is this problem called?",opts:["Model overfitting","Training-serving skew","Data lake corruption","Feature store failure"],correct:1,exp:"Training-serving skew is when the feature computation differs between training and production. The model learned patterns from one country code format and now receives a different format — its predictions degrade silently. A shared feature store with versioned computation logic prevents this."},
]}},
{id:43,title:"LLM-Powered Customer Support Bot",tag:"AI Systems",time:"14 min",content:{intro:"A customer support bot powered by an LLM can handle thousands of simultaneous conversations, resolve common issues instantly, and escalate complex cases to humans. The key engineering challenge is giving the LLM access to your company's specific knowledge.",sections:[
{h2:"RAG: Retrieval-Augmented Generation",body:`<div class="code-block">Problem: LLMs don't know your specific company data
  (product catalog, order history, support policies, FAQs)

Solution: RAG (Retrieval-Augmented Generation)

1. Offline preparation:
   Company docs, FAQs, policies → chunked → embedded (vector representation)
   → stored in Vector DB (Pinecone, Weaviate, Chroma)

2. At query time:
   User: "How do I return my order #12345?"
   
   a) Convert query to vector embedding
   b) Vector similarity search in Vector DB
      → finds top-3 most relevant document chunks:
        "Return policy: items returnable within 30 days..."
        "Order lookup API returns..."
   
   c) Build prompt:
      "You are a support agent for TechShop. Context: {relevant docs}
       Customer asked: {user question}. Answer helpfully."
   
   d) LLM generates accurate, company-specific answer</div>`,callout:{type:"success",title:"Why RAG Works",body:"Without RAG, an LLM answers from general training knowledge and makes up specifics. With RAG, the LLM has your actual policies, product details, and order data in context — answers are grounded in real information, not hallucinations."}},
{h2:"Architecture",body:`<div class="code-block">[User message]
       ↓
[Intent Classifier] — classify: order_status, refund, technical, billing
       ↓
[Entity Extractor] — extract: order_id=12345, product="laptop"
       ↓
[Tool Use Layer]
  → If order_status: query Order DB → inject result into context
  → If refund: query Refund Policy KB via RAG
  → If technical: query Product Manual KB via RAG
       ↓
[LLM with injected context]
       ↓
[Response + Confidence Score]
  → High confidence: return to user
  → Low confidence or flagged topic: escalate to human agent</div>`},
{h2:"Escalation to Human Agents",body:`<ul><li>User explicitly asks for a human</li><li>Confidence score below threshold (&lt;70%)</li><li>Detected emotion: frustration, anger, distress</li><li>Topic requires human judgment (large refunds, legal matters, medical)</li><li>Conversation loop (user asked the same question 3 times)</li></ul>`},
],quiz:[
{q:"A customer asks 'Is product X compatible with Y?' The LLM was trained before X was released. Without RAG, what happens? With RAG?",opts:["Without: correct answer. With: slower answer","Without: LLM hallucinates or says it doesn't know. With RAG: retrieves product spec sheet from KB → gives accurate answer","Both produce the same answer","Without: refuses to answer. With: answers incorrectly"],correct:1,exp:"LLMs have a training cutoff and no knowledge of your specific products. Without RAG, the LLM either halluccinates an answer or admits it doesn't know. With RAG, the product specification is retrieved from your knowledge base and injected into the prompt — the LLM produces an accurate, grounded answer."},
]}},
{id:44,title:"AI-Powered Code Assistant",tag:"AI Systems",time:"13 min",content:{intro:"AI code assistants (like GitHub Copilot, Cursor, or Claude Code) help developers write code via inline completions, natural language generation, explanation, and debugging. The engineering challenge is achieving sub-200ms latency at scale.",sections:[
{h2:"What Makes Code Assistants Unique",body:`<table class="comp-table"><thead><tr><th>Challenge</th><th>Why It's Hard</th><th>Solution</th></tr></thead><tbody><tr><td>Ultra-low latency (&lt;200ms)</td><td>Inline completions must feel instant to not interrupt flow</td><td>Smaller fast model for completions; larger for chat</td></tr><tr><td>Large codebase context</td><td>Good completions need to understand the whole project</td><td>LSP + RAG: retrieve relevant code snippets from codebase</td></tr><tr><td>Security</td><td>Code is sensitive IP — cannot send to external servers for some companies</td><td>On-premise deployment option</td></tr><tr><td>Multi-language</td><td>Python, JS, Rust, Go, SQL — all different patterns</td><td>Fine-tune on diverse code dataset per language</td></tr></tbody></table>`},
{h2:"Inline Completion Architecture",body:`<div class="code-block">[Developer types in editor]
       ↓
[IDE Plugin captures context]
  → Current file (last 2000 tokens before cursor)
  → Open tab files (related code)
  → Current function signature + docstring
  → Language + framework detected
       ↓
[Context Optimizer]
  → Trim to fit model context window (e.g., 8K tokens)
  → Rank and select most relevant code snippets via RAG
  → Retrieve similar code patterns from codebase index
       ↓
[Fast Completion Model] (specialized: CodeLlama-7B, StarCoder-3B)
  → Optimized for inline FIM (Fill-In-the-Middle)
  → Target: &lt;150ms for 1-3 lines of completion
       ↓
[Streaming tokens displayed in editor as ghost text]
  Developer: Tab to accept, Esc to dismiss, continue typing</div>`,callout:{type:"info",title:"Fill-in-the-Middle (FIM)",body:"FIM is a special training format where the model sees code before AND after the cursor, then generates what fills the gap. This is crucial for inline completions — you're not always completing at the end of a file, often you're inserting in the middle."}},
